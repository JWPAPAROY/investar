# 전 상장종목 일별 수급+가격 수집 (v3.93)
# 평일 17:50 KST (08:50 UTC) — KIS 투자자 데이터가 장 마감 후 확정되는 시간 이후.
# Vercel 60초 타임아웃 때문에 GitHub Actions에서 실행 (약 8~12분 소요).
name: collect-market-flow

on:
  schedule:
    - cron: '50 8 * * 1-5'
  workflow_dispatch:
    inputs:
      backfill:
        description: '30일 백필 실행 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Collect market flow
        run: node scripts/collect-market-flow.js ${{ github.event.inputs.backfill == 'true' && '--backfill' || '' }}
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
