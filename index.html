<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Volume Analyzer - AI 추천 종목</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    }

    .stock-card {
      transition: all 0.3s ease;
    }

    .stock-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .pulse-animation {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide-in {
      animation: slideIn 0.5s ease-out;
    }

    .grade-과열 {
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
    }

    .grade-S\+ {
      background: linear-gradient(135deg, #ff0066 0%, #cc0044 100%);
    }

    .grade-S {
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
    }

    .grade-A {
      background: linear-gradient(135deg, #00cc00 0%, #008800 100%);
    }

    .grade-B {
      background: linear-gradient(135deg, #ffaa00 0%, #ff8800 100%);
    }

    .grade-C {
      background: linear-gradient(135deg, #ff9966 0%, #ff7744 100%);
    }

    .grade-D {
      background: linear-gradient(135deg, #cccccc 0%, #999999 100%);
    }
  </style>
</head>

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // API URL 자동 감지 (로컬 vs Vercel)
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3001/api'
      : 'https://investar-xi.vercel.app/api';  // Vercel 배포 후 변경

    // 메인 앱
    function App() {
      const [recommendations, setRecommendations] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedStock, setSelectedStock] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [activeTab, setActiveTab] = useState('screening'); // screening, performance, dna
      const [screeningMetadata, setScreeningMetadata] = useState(null); // 스크리닝 메타데이터
      const [top3Recommendations, setTop3Recommendations] = useState([]); // 🆕 TOP 3 추천 종목
      const [defenseTop3Recommendations, setDefenseTop3Recommendations] = useState([]); // v3.34: 방어 TOP 3
      const [strategyFilter, setStrategyFilter] = useState('momentum'); // v3.34: momentum, defense, all

      // 데이터 캐싱
      const [cachedData, setCachedData] = useState(null);

      // 성과 검증 데이터 상태 (캐싱용)
      const [trackerData, setTrackerData] = useState(null);
      const [performanceLoading, setPerformanceLoading] = useState(false);
      const [performanceError, setPerformanceError] = useState(null);

      // 패턴 분석 데이터 상태
      const [patternAnalysis, setPatternAnalysis] = useState(null);
      const [patternLoading, setPatternLoading] = useState(false);

      // 추천 종목을 Supabase에 저장 (성과 추적용)
      // ⚠️ v3.10.3부터 프론트엔드 자동 저장 제거 - Cron만 저장
      // 실제 저장 기준: 50-89점 (save-daily-recommendations.js, v3.17에서 50-90으로 확장)
      const saveRecommendationsToSupabase = async (stocks) => {
        try {
          // v3.17: 저장 범위 확장 (S등급 75-89점 포함)
          // - 50-89점: B~S등급 성과 추적
          // - 45-49점: 승률 21.62%, 평균 -5.13% (제외)
          const stocksToSave = stocks.filter(s => s.totalScore >= 50 && s.totalScore < 90);

          if (stocksToSave.length === 0) {
            console.log('저장할 추천 종목 없음 (50점 이상 범위 없음)');
            return;
          }

          const response = await fetch(`${API_BASE_URL}/recommendations/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stocks: stocksToSave })
          });

          const result = await response.json();

          if (result.success) {
            console.log(`✅ ${result.saved}개 추천 종목 저장 완료 (${result.date})`);
          } else {
            console.warn('추천 종목 저장 실패:', result.message);
          }
        } catch (err) {
          console.warn('Supabase 저장 실패 (무시):', err.message);
        }
      };

      // 추천 종목 불러오기
      const fetchRecommendations = async () => {
        try {
          setLoading(true);
          setError(null);

          const url = `${API_BASE_URL}/screening/recommend`;

          const response = await fetch(url);
          const result = await response.json();

          if (result.success) {
            const stocks = result.recommendations || [];
            // ⭐ 안전장치: 프론트엔드에서도 점수 내림차순 정렬 (백엔드 정렬 보강)
            stocks.sort((a, b) => b.totalScore - a.totalScore);
            setRecommendations(stocks);
            setTop3Recommendations(result.top3 || []); // 🆕 TOP 3 추천 종목 저장
            setDefenseTop3Recommendations(result.defenseTop3 || []); // v3.34
            setScreeningMetadata(result.metadata || null);
            setLastUpdate(new Date());

            // 캐시에 저장
            setCachedData({
              recommendations: stocks,
              top3: result.top3 || [],
              defenseTop3: result.defenseTop3 || [],
              metadata: result.metadata || null,
              timestamp: new Date()
            });

            // ⭐ v3.10.3: 프론트엔드 자동 저장 제거 (Cron만 저장)
            // Cron Job(16:10 KST)이 장마감 종가 기준으로만 저장 → 백테스트 정확도 향상
          } else {
            setError(result.error || '데이터 로드 실패');
          }
        } catch (err) {
          setError('서버와 연결할 수 없습니다: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      // 성과 검증 데이터 불러오기
      const fetchPerformanceData = async () => {
        setPerformanceLoading(true);
        setPerformanceError(null);

        try {
          // Supabase 기반 실전 추천 종목 성과 조회
          const perfRes = await fetch(`${API_BASE_URL}/recommendations/performance?days=7`);

          if (!perfRes.ok) {
            throw new Error(`API 오류: ${perfRes.status}`);
          }

          const perfData = await perfRes.json();

          if (!perfData.success) {
            throw new Error(perfData.message || '데이터 로드 실패');
          }

          // 데이터 없으면 안내
          if (perfData.count === 0) {
            setTrackerData({
              statistics: {
                overall: {
                  totalSignals: 0,
                  winRate: 0,
                  avgReturn: 0,
                  totalCount: 0,
                  winCount: 0,
                  maxReturn: 0,
                  minReturn: 0
                }
              },
              stocks: [],
              isEmpty: true
            });
            setPerformanceLoading(false);
            return;
          }

          // 등급별 통계 계산
          const byGrade = {};
          perfData.stocks.forEach(stock => {
            const grade = stock.recommendation_grade;
            if (!byGrade[grade]) {
              byGrade[grade] = {
                count: 0,
                winCount: 0,
                returns: [],
                maxReturn: 0
              };
            }
            byGrade[grade].count++;
            if (stock.is_winning) byGrade[grade].winCount++;
            byGrade[grade].returns.push(stock.current_return);
            if (stock.current_return > byGrade[grade].maxReturn) {
              byGrade[grade].maxReturn = stock.current_return;
            }
          });

          // 등급별 평균 계산
          const gradeStats = {};
          Object.entries(byGrade).forEach(([grade, data]) => {
            gradeStats[grade] = {
              count: data.count,
              winRate: ((data.winCount / data.count) * 100).toFixed(1),
              avgReturn: (data.returns.reduce((a, b) => a + b, 0) / data.count).toFixed(2),
              maxReturn: data.maxReturn.toFixed(2)
            };
          });

          // 연속 급등주 필터링 (2일 이상 연속 상승)
          const risingStocks = perfData.stocks.filter(s => s.is_rising);

          // ⭐ 전체 종목을 점수 내림차순으로 정렬
          const sortedStocks = [...perfData.stocks].sort((a, b) => b.total_score - a.total_score);

          setTrackerData({
            statistics: {
              overall: {
                totalSignals: perfData.count,
                totalCount: perfData.count,
                winRate: perfData.statistics.winRate,
                winCount: perfData.statistics.winningCount,
                avgReturn: perfData.statistics.avgReturn,
                maxReturn: perfData.statistics.maxReturn,
                minReturn: perfData.statistics.minReturn
              },
              byGrade: gradeStats,
              byCategory: perfData.statistics?.byCategory || {}
            },
            stocks: sortedStocks,
            risingStocks: risingStocks,
            recommendationDates: perfData.recommendationDates || [],
            commonStocks: perfData.commonStocks || [],
            parameters: {
              holdingDays: 'N/A (실시간)',
              lookbackDays: 7
            }
          });

          // 🆕 패턴 분석 데이터 로드 (비동기, 별도 로딩)
          setPatternLoading(true);
          fetch(`${API_BASE_URL}/patterns`)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                setPatternAnalysis(data);
              }
            })
            .catch(err => console.warn('패턴 분석 로드 실패:', err))
            .finally(() => setPatternLoading(false));

        } catch (err) {
          console.error('성과 데이터 로드 실패:', err);
          setPerformanceError('성과 데이터 로드 실패: ' + err.message);
        } finally {
          setPerformanceLoading(false);
        }
      };

      // 종목 상세 분석 (API 호출 없이 recommendations 데이터 사용)
      const fetchStockDetail = (stockCode) => {
        const stock = recommendations.find(s => s.stockCode === stockCode);
        if (stock) {
          setSelectedStock(stock);
        } else {
          console.error('종목 데이터를 찾을 수 없습니다:', stockCode);
        }
      };

      // 초기 로드 제거 (수동 버튼 클릭으로만 실행)
      // useEffect(() => {
      //   fetchRecommendations();
      // }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
          {/* 헤더 */}
          <header className="bg-white shadow-lg border-b-4 border-indigo-600">
            <div className="max-w-7xl mx-auto px-4 py-6">
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                    🤖 AI Stock Screener
                  </h1>
                  <p className="text-gray-600 mt-2">거래량 AI가 추천하는 오늘의 종목</p>
                </div>
                <button
                  onClick={() => {
                    if (activeTab === 'screening') {
                      setCachedData(null);
                      fetchRecommendations();
                    } else {
                      window.location.reload();
                    }
                  }}
                  disabled={loading}
                  className="px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 font-semibold shadow-lg"
                >
                  {loading ? '분석중...' : '🔄 새로고침'}
                </button>
              </div>
              {/* 탭 메뉴 */}
              <div className="flex gap-4 mt-6 border-b border-gray-200">
                <button
                  onClick={() => setActiveTab('screening')}
                  className={`px-6 py-3 font-semibold transition-all ${activeTab === 'screening'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  📊 종목 스크리닝
                </button>
                <button
                  onClick={() => {
                    setActiveTab('performance');
                    // 데이터가 없으면 자동 로드 (캐싱 효과)
                    if (!trackerData) {
                      fetchPerformanceData();
                    }
                  }}
                  className={`px-6 py-3 font-semibold transition-all ${activeTab === 'performance'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  📈 성과 검증
                </button>
                <button
                  onClick={() => setActiveTab('dna')}
                  className={`px-6 py-3 font-semibold transition-all ${activeTab === 'dna'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  🧬 DNA 추출
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8">
            {/* 에러 메시지 */}
            {error && (
              <div className="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4 shadow">
                <div className="flex justify-between">
                  <span>{error}</span>
                  <button onClick={() => setError(null)} className="font-bold">×</button>
                </div>
              </div>
            )}

            {/* 탭별 콘텐츠 */}
            {activeTab === 'dna' ? (
              <DnaExtraction apiBaseUrl={API_BASE_URL} recommendations={recommendations} />
            ) : activeTab === 'screening' ? (
              <>
                {/* 마지막 업데이트 시간 */}
                {lastUpdate && (
                  <div className="text-sm text-gray-600 mb-4 text-center">
                    마지막 업데이트: {lastUpdate.toLocaleString('ko-KR')}
                  </div>
                )}

                {/* 스크리닝 메타데이터 */}
                {screeningMetadata && recommendations.length > 0 && (
                  <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4 rounded">
                    <div className="flex items-center justify-center gap-6 text-sm">
                      <div>
                        <span className="text-gray-600">분석:</span>
                        <span className="font-bold text-blue-900 ml-1">{screeningMetadata.totalAnalyzed}개</span>
                      </div>
                      <div className="text-gray-400">|</div>
                      <div>
                        <span className="text-gray-600">조건 충족:</span>
                        <span className="font-bold text-green-700 ml-1">{screeningMetadata.totalFound}개</span>
                      </div>
                      <div className="text-gray-400">|</div>
                      <div>
                        <span className="text-gray-600">표시:</span>
                        <span className="font-bold text-indigo-700 ml-1">{screeningMetadata.returned}개</span>
                      </div>
                      {screeningMetadata.poolSize && (
                        <>
                          <div className="text-gray-400">|</div>
                          <div>
                            <span className="text-gray-600">풀 크기:</span>
                            <span className="font-bold text-purple-700 ml-1">{screeningMetadata.poolSize}개</span>
                          </div>
                        </>
                      )}
                    </div>
                    <p className="text-xs text-gray-500 text-center mt-2">
                      종목 풀: 등락률·거래량급증·거래량·거래대금 상위 50개 × KOSPI+KOSDAQ (400개) → ETF/ETN 제거 → 중복 제거 → 분석 대상 (매 조회 시 시장 상황에 따라 변동)
                    </p>
                  </div>
                )}

                {/* v3.34: 전략 필터 토글 */}
                {lastUpdate && recommendations.length > 0 && (
                  <div className="flex justify-center gap-2 mb-4">
                    {[
                      { key: 'momentum', label: '🔴 모멘텀', desc: '상승 모멘텀' },
                      { key: 'defense', label: '🛡️ 방어', desc: '하락 방어' },
                      { key: 'all', label: '📊 전체', desc: '모두 표시' }
                    ].map(s => (
                      <button
                        key={s.key}
                        onClick={() => setStrategyFilter(s.key)}
                        className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all ${
                          strategyFilter === s.key
                            ? s.key === 'momentum' ? 'bg-red-500 text-white' : s.key === 'defense' ? 'bg-blue-500 text-white' : 'bg-gray-700 text-white'
                            : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                        }`}
                        title={s.desc}
                      >
                        {s.label}
                      </button>
                    ))}
                  </div>
                )}

                {/* 🆕 TOP 3 추천 종목 섹션 - 전략별 분리 */}
                {lastUpdate && (() => {
                  const showMomentum = strategyFilter === 'momentum' || strategyFilter === 'all';
                  const showDefense = strategyFilter === 'defense' || strategyFilter === 'all';
                  const activeTop3 = strategyFilter === 'defense' ? defenseTop3Recommendations : top3Recommendations;

                  return (
                    <div className="space-y-4 mb-8">
                      {/* 모멘텀 TOP 3 */}
                      {showMomentum && (
                        <div className="bg-gradient-to-r from-yellow-50 to-orange-50 border-2 border-yellow-300 rounded-xl p-6">
                          <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-3">
                              <span className="text-3xl">🏆</span>
                              <div>
                                <h3 className="text-2xl font-bold text-orange-800">모멘텀 TOP 3</h3>
                                <p className="text-sm text-orange-600 mt-1">매수고래 + 비과열 → 점수 내림차순</p>
                              </div>
                            </div>
                            {top3Recommendations.length > 0 && (
                              <div className="bg-orange-600 text-white px-4 py-2 rounded-full font-bold text-lg">{top3Recommendations.length}개</div>
                            )}
                          </div>
                          {top3Recommendations.length > 0 ? (
                            <>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                                {top3Recommendations.map((stock, index) => (
                                  <div key={stock.stockCode} className="bg-white border-2 border-yellow-400 rounded-lg p-4 cursor-pointer hover:shadow-xl transition-all duration-200 transform hover:-translate-y-1" onClick={() => fetchStockDetail(stock.stockCode)}>
                                    <div className="flex items-center justify-between mb-2">
                                      <div className="flex items-center gap-2">
                                        <span className="text-2xl font-bold text-orange-600">#{index + 1}</span>
                                        <span className="text-lg font-bold text-gray-800">{stock.stockName}</span>
                                      </div>
                                      <span className={`px-2 py-1 rounded text-xs font-bold ${stock.recommendation.grade === 'S+' ? 'bg-purple-100 text-purple-700' : stock.recommendation.grade === 'S' ? 'bg-red-100 text-red-700' : stock.recommendation.grade === 'A' ? 'bg-orange-100 text-orange-700' : 'bg-yellow-100 text-yellow-700'}`}>{stock.recommendation.grade}</span>
                                    </div>
                                    <div className="space-y-2 text-sm">
                                      <div className="flex justify-between"><span className="text-gray-600">현재가</span><span className="font-bold">{stock.currentPrice.toLocaleString()}원</span></div>
                                      <div className="flex justify-between"><span className="text-gray-600">종합 점수</span><span className="font-bold text-orange-600">{stock.totalScore.toFixed(1)}점</span></div>
                                      <div className="flex justify-between items-center"><span className="text-gray-600">추천 등급</span><span className="text-xs text-orange-700 font-semibold">{stock.recommendation.text}</span></div>
                                    </div>
                                    {stock.top3Meta && (
                                      <div className="mt-3">
                                        <div className="bg-red-50 border border-red-200 rounded-lg p-2">
                                          <div className="flex justify-between items-center text-xs">
                                            <span className="text-red-800 font-semibold">🚨 권장 손절가</span>
                                            <span className="font-bold text-red-600">{stock.top3Meta.stopLoss.loss5.toLocaleString()}원</span>
                                          </div>
                                          <div className="text-xs text-gray-500 mt-1">-5% 기준 (빠른 손절)</div>
                                        </div>
                                      </div>
                                    )}
                                    <div className="mt-3 flex flex-wrap gap-1">
                                      {stock.advancedAnalysis?.indicators?.whale?.length > 0 && (<span className="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-semibold">🐋 고래 감지</span>)}
                                      {stock.totalScore >= 50 && stock.totalScore < 90 && (<span className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-semibold">⭐ 저장구간</span>)}
                                    </div>
                                  </div>
                                ))}
                              </div>
                              <div className="mt-4 bg-white border border-yellow-300 rounded-lg p-3">
                                <p className="text-sm text-gray-700">
                                  <strong className="text-orange-700">💡 선정 기준:</strong> 고래 감지 종목 우선. 1순위: 50-89점, 2순위: 70점+, 3순위: 40점+.
                                </p>
                              </div>
                            </>
                          ) : (
                            <div className="bg-white border-2 border-gray-300 rounded-lg p-6 text-center">
                              <div className="text-4xl mb-2">😔</div>

    // 추천 종목 카드

                  <StatBox

                    value={stock.advancedAnalysis.indicators.asymmetric.ratio}
                    desc={`${stock.advancedAnalysis.indicators.asymmetric.signal} | 상승 ${stock.advancedAnalysis.indicators.asymmetric.upDays}일(${stock.advancedAnalysis.indicators.asymmetric.upVolume ? (stock.advancedAnalysis.indicators.asymmetric.upVolume / 1000000).toFixed(0) : 0}M) vs 하락 ${stock.advancedAnalysis.indicators.asymmetric.downDays}일(${stock.advancedAnalysis.indicators.asymmetric.downVolume ? (stock.advancedAnalysis.indicators.asymmetric.downVolume / 1000000).toFixed(0) : 0}M)`}
                  />

                    label="최근 5일 거래량 변동율"
                    value={stock.trendAnalysis && stock.trendAnalysis.dailyData.length >= 5 ?
                      (() => {
                        // 기하평균 계산: (v1 * v2 * v3 * v4 * v5)^(1/5)
                        const changes = stock.trendAnalysis.dailyData.slice(0, 5).map(d => d.volumeChange);
                        const positiveChanges = changes.map(c => 1 + (c / 100)); // 변동율을 승수로 변환
                        const product = positiveChanges.reduce((acc, val) => acc * val, 1);
                        const geometricMean = Math.pow(product, 1 / positiveChanges.length);
                        const avgChange = (geometricMean - 1) * 100;
                        return (avgChange >= 0 ? '+' : '') + avgChange.toFixed(1) + '%';
                      })()
                      : 'N/A'}
                    desc="5일 기하평균"

          {/* 추천일자별 성과 */}
          {perfStrategy === 'momentum' && trackerData.recommendationDates && trackerData.recommendationDates.length > 0 && (

                    'from-purple-50 to-pink-50 border-purple-300',
                    'from-yellow-50 to-orange-50 border-yellow-300',
                    'from-red-50 to-rose-50 border-red-300',
                    'from-indigo-50 to-violet-50 border-indigo-300',

                                {stock.is_top3 && (

                                        for (let i = 1; i < stock.daily_prices.length; i++) {
                                          const prev = stock.daily_prices[i - 1].volume;
                                          const curr = stock.daily_prices[i].volume;
                                          if (prev && curr && prev > 0) {

                                          }

                                        if (volumeChanges.length > 0) {
                                          const product = volumeChanges.reduce((acc, val) => acc * val, 1);

                                          const avgChange = (geometricMean - 1) * 100;

                                            <span className="ml-2 font-semibold">

          {/* v3.34: 방어 전략 일자별 성과 */}

            const defDates = trackerData.recommendationDates.map(dg => {
              const defStocks = dg.stocks.filter(s => (s.defense_score || 0) > 0 && (s.days_since_recommendation || 0) > 0);
              if (defStocks.length === 0) return null;
              const winCount = defStocks.filter(s => s.is_winning).length;
              const avgReturn = defStocks.length > 0 ? defStocks.reduce((sum, s) => sum + s.current_return, 0) / defStocks.length : 0;
              return { ...dg, stocks: defStocks.sort((a, b) => (b.defense_score || 0) - (a.defense_score || 0)), winRate: (winCount / defStocks.length * 100).toFixed(1), avgReturn: avgReturn.toFixed(2), defCount: defStocks.length };

            // 전체 방어 통계

            const totalWin = allDefStocks.filter(s => s.is_winning).length;
            const totalAvg = allDefStocks.length > 0 ? allDefStocks.reduce((sum, s) => sum + s.current_return, 0) / allDefStocks.length : 0;

              <div className="space-y-6">

          {/* Phase 3: 포트폴리오 시뮬레이션 */}

                  <div className="text-xs text-gray-700">
                    {trackerData.portfolio.summary.worstPortfolio?.stocks.map((s, i) => (
                      <div key={i}>{s.name} ({s.return > 0 ? '+' : ''}{s.return}%)</div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Phase 3: 시장 상황별 분석 */}
          {trackerData.byMarket && (
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h3 className="text-2xl font-bold mb-6">📊 시장 상황별 성과</h3>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {Object.entries(trackerData.byMarket).map(([key, mstats]) => (
                  <div key={key} className="bg-gray-50 border-2 border-gray-200 rounded-lg p-4">
                    <h4 className="font-bold text-gray-900 mb-2">{mstats.label}</h4>
                    <div className="space-y-1 text-sm">
                      <div>샘플: {mstats.count}개</div>
                      <div className={mstats.winRate >= 60 ? 'text-green-600 font-bold' : 'text-gray-700'}>
                        승률: {mstats.winRate}%
                      </div>
                      <div className={mstats.avgReturn > 0 ? 'text-red-600 font-bold' : 'text-blue-600'}>
                        평균: {mstats.avgReturn > 0 ? '+' : ''}{mstats.avgReturn}%
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 데이터 생성 시간 */}
          <div className="text-center text-sm text-gray-500">
            데이터 조회: {new Date().toLocaleString('ko-KR')}
          </div>
        </div>
      );
    }

    // 요약 카드
    function SummaryCard({ title, value, subtext, color, icon }) {
      return (
        <div className={`${color} rounded-xl shadow-lg p-6 text-white`}>
          <div className="flex items-center justify-between mb-2">
            <h3 className="text-sm font-semibold opacity-90">{title}</h3>
            <span className="text-2xl">{icon}</span>
          </div>
          <p className="text-3xl font-bold mb-1">{value}</p>
          <p className="text-sm opacity-80">{subtext}</p>
        </div>
      );
    }

    // 고급 지표 박스
    function AdvancedMetricBox({ label, value, desc, good }) {
      return (
        <div className={`p-4 rounded-lg border-2 ${good ? 'bg-green-50 border-green-300' : 'bg-gray-50 border-gray-200'}`}>
          <p className="text-xs text-gray-600 mb-1">{label}</p>
          <p className={`text-2xl font-bold mb-1 ${good ? 'text-green-700' : 'text-gray-700'}`}>{value}</p>
          <p className="text-xs text-gray-500">{desc}</p>
        </div>
      );
    }

    // DNA 추출 컴포넌트
    function DnaExtraction({ apiBaseUrl, recommendations = [] }) {
      const [stocks, setStocks] = useState([{ code: '', startDate: '', endDate: '' }]);
      const [extractedDNA, setExtractedDNA] = useState(null);
      const [matchedStocks, setMatchedStocks] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [scanOptions, setScanOptions] = useState({
        matchThreshold: 70,
        limit: 10,
        days: 25
      });
      const [autoRecommendations, setAutoRecommendations] = useState([]);
      const [fetchLoading, setFetchLoading] = useState(false);

      // Auto-fetch recommendations if not provided
      useEffect(() => {
        const fetchRecommendations = async () => {
          console.log('[DNA Tab] Checking recommendations:', recommendations.length);
          if (recommendations.length === 0) {
            console.log('[DNA Tab] Fetching screening data...');
            setFetchLoading(true);
            try {
              const url = `${apiBaseUrl}/screening/recommend?market=ALL&limit=50`;
              console.log('[DNA Tab] Fetching from:', url);
              const response = await fetch(url);
              console.log('[DNA Tab] Response status:', response.status);
              const data = await response.json();
              console.log('[DNA Tab] Data received:', data);
              if (data.success && data.recommendations) {
                setAutoRecommendations(data.recommendations);
                console.log('[DNA Tab] Set recommendations:', data.recommendations.length);
              } else {
                console.error('[DNA Tab] No success or recommendations in response');
              }
            } catch (err) {
              console.error('[DNA Tab] Failed to fetch recommendations:', err);
            } finally {
              setFetchLoading(false);
            }
          } else {
            console.log('[DNA Tab] Using provided recommendations');
          }
        };
        fetchRecommendations();
      }, [apiBaseUrl, recommendations.length])

      // 종목 추가
      const addStock = () => {
        setStocks([...stocks, { code: '', startDate: '', endDate: '' }]);
      };

      // 종목 제거
      const removeStock = (index) => {
        if (stocks.length > 1) {
          const newStocks = stocks.filter((_, i) => i !== index);
          setStocks(newStocks);
        }
      };

      // 종목 정보 업데이트
      const updateStock = (index, field, value) => {
        const newStocks = [...stocks];
        newStocks[index][field] = value;
        setStocks(newStocks);
      };

      // DNA 추출
      const extractDNA = async () => {
        try {
          setLoading(true);
          setError(null);
          setExtractedDNA(null);
          setMatchedStocks(null);

          // 유효성 검사
          const validStocks = stocks.filter(s => s.code && s.startDate && s.endDate);
          if (validStocks.length === 0) {
            throw new Error('최소 2개 종목의 코드와 날짜를 입력하세요');
          }

          const response = await fetch(`${apiBaseUrl}/patterns/volume-dna`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mode: 'extract',
              stocks: validStocks
            })
          });

          const result = await response.json();

          if (result.success) {
            setExtractedDNA(result.result);
          } else {
            throw new Error(result.error || 'DNA 추출 실패');
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      // 시장 스캔
      const scanMarket = async () => {
        if (!extractedDNA) {
          setError('먼저 DNA를 추출하세요');
          return;
        }

        try {
          setLoading(true);
          setError(null);

          const response = await fetch(`${apiBaseUrl}/patterns/volume-dna`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mode: 'scan',
              commonDNA: extractedDNA.commonDNA,
              options: scanOptions
            })
          });

          const result = await response.json();

          if (result.success) {
            setMatchedStocks(result.result);
          } else {
            throw new Error(result.error || '시장 스캔 실패');
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="space-y-6">
          {/* 헤더 */}
          <div className="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl shadow-lg p-6 text-white">
            <h2 className="text-3xl font-bold mb-2">🧬 거래량 DNA 추출 시스템</h2>
            <p className="text-purple-100">
              과거 급등주의 거래량 패턴에서 DNA를 추출하여 현재 시장에서 유사한 종목을 찾습니다
            </p>
          </div>

          {error && (
            <div className="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded">
              {error}
            </div>
          )}

          {/* 과열 종목 표시 */}
          {(() => {
            const allRecs = recommendations.length > 0 ? recommendations : autoRecommendations;
            const warningStocks = allRecs
              .filter(stock => stock.recommendation?.grade === '과열')
              .sort((a, b) => b.totalScore - a.totalScore);

            if (fetchLoading) {
              return (
                <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-6 mb-6 text-center">
                  <div className="text-blue-600">🔄 과열 종목 데이터 로딩 중...</div>
                </div>
              );
            }

            if (warningStocks.length > 0) {
              return (
                <div className="bg-red-50 border-2 border-red-200 rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="text-2xl">⚠️</span>
                    <h3 className="text-xl font-bold text-red-800">
                      당일 과열 종목 ({warningStocks.length}개)
                    </h3>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full border-collapse">
                      <thead>
                        <tr className="bg-red-100 border-b-2 border-red-300">
                          <th className="px-4 py-2 text-left">종목명</th>
                          <th className="px-4 py-2 text-left">코드</th>
                          <th className="px-4 py-2 text-center">등급</th>
                          <th className="px-4 py-2 text-right">점수</th>
                          <th className="px-4 py-2 text-right">현재가</th>
                        </tr>
                      </thead>
                      <tbody>
                        {warningStocks.map((stock, index) => (
                          <tr key={stock.stockCode} className="border-b border-red-200 hover:bg-red-100 transition-colors">
                            <td className="px-4 py-2 font-medium">{stock.stockName}</td>
                            <td className="px-4 py-2 font-mono text-sm text-gray-700">{stock.stockCode}</td>
                            <td className="px-4 py-2 text-center">
                              <span className="px-2 py-1 bg-red-600 text-white rounded text-xs font-bold">
                                {stock.recommendation.grade}
                              </span>
                            </td>
                            <td className="px-4 py-2 text-right font-bold text-red-700">{stock.totalScore.toFixed(1)}점</td>
                            <td className="px-4 py-2 text-right font-semibold">{stock.currentPrice?.toLocaleString()}원</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  <div className="text-xs text-gray-600 mt-4 bg-white p-3 rounded border border-red-200">
                    💡 <strong>사용 방법:</strong> 위 종목 코드를 복사하여 아래 DNA 추출 입력란에 붙여넣기하세요
                  </div>
                </div>
              );
            }
            return null;
          })()}

          {/* Phase 1: DNA 추출 */}
          <div className="bg-white rounded-xl shadow-lg p-6">
            <h3 className="text-xl font-bold text-gray-800 mb-4">📊 Phase 1: DNA 추출</h3>
            <p className="text-sm text-gray-600 mb-4">
              과거 급등했던 종목들의 거래량 패턴을 분석하여 공통 DNA를 추출합니다
            </p>

            {/* 종목 입력 폼 */}
            <div className="space-y-3 mb-4">
              {stocks.map((stock, index) => (
                <div key={index} className="flex gap-2 items-center">
                  <input
                    type="text"
                    placeholder="종목코드 (예: 005930)"
                    value={stock.code}
                    onChange={(e) => updateStock(index, 'code', e.target.value)}
                    className="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
                  />
                  <input
                    type="text"
                    placeholder="시작일 (YYYYMMDD)"
                    value={stock.startDate}
                    onChange={(e) => updateStock(index, 'startDate', e.target.value)}
                    className="w-40 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
                  />
                  <input
                    type="text"
                    placeholder="종료일 (YYYYMMDD)"
                    value={stock.endDate}
                    onChange={(e) => updateStock(index, 'endDate', e.target.value)}
                    className="w-40 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500"
                  />
                  {stocks.length > 1 && (
                    <button
                      onClick={() => removeStock(index)}
                      className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600"
                    >
                      ✕
                    </button>
                  )}
                </div>
              ))}
            </div>

            <div className="flex gap-2">
              <button
                onClick={addStock}
                className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300"
              >
                + 종목 추가
              </button>
              <button
                onClick={extractDNA}
                disabled={loading}
                className="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50"
              >
                {loading ? '🔍 추출 중...' : '🧬 DNA 추출'}
              </button>
            </div>
          </div>

          {/* 추출된 DNA 결과 */}
          {extractedDNA && (
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-bold text-gray-800 mb-4">✅ 추출된 DNA</h3>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="bg-purple-50 p-4 rounded-lg">
                  <p className="text-sm text-gray-600">DNA 강도</p>
                  <p className="text-2xl font-bold text-purple-600">{extractedDNA.dnaStrength}%</p>
                </div>
                <div className="bg-indigo-50 p-4 rounded-lg">
                  <p className="text-sm text-gray-600">분석 종목</p>
                  <p className="text-2xl font-bold text-indigo-600">{extractedDNA.basedOnStocks}개</p>
                </div>
              </div>

              {/* DNA 세부 정보 */}
              <div className="space-y-4">
                {extractedDNA.commonDNA.volumeRate && (
                  <div className="border-l-4 border-purple-500 pl-4">
                    <p className="font-semibold text-gray-800">거래량 증가율 DNA</p>
                    <div className="text-sm text-gray-600 mt-2 space-y-1">
                      <p>• 평균 EMA: <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.avgEMA.toFixed(2)}%</span></p>
                      <p>• 최근 5일 평균: <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.avgRecent5d.toFixed(2)}%</span></p>
                      <p>• 임계값 (EMA): <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.threshold.emaMin.toFixed(2)}%</span></p>
                    </div>
                  </div>
                )}

                {extractedDNA.commonDNA.institutionFlow && (
                  <div className="border-l-4 border-indigo-500 pl-4">
                    <p className="font-semibold text-gray-800">기관 투자자 DNA</p>
                    <div className="text-sm text-gray-600 mt-2">
                      <p>• 평균 연속 매수: <span className="font-semibold">{extractedDNA.commonDNA.institutionFlow.avgConsecutiveDays}일</span></p>
                    </div>
                  </div>
                )}

                {extractedDNA.commonDNA.foreignFlow && (
                  <div className="border-l-4 border-blue-500 pl-4">
                    <p className="font-semibold text-gray-800">외국인 투자자 DNA</p>
                    <div className="text-sm text-gray-600 mt-2">
                      <p>• 평균 연속 매수: <span className="font-semibold">{extractedDNA.commonDNA.foreignFlow.avgConsecutiveDays}일</span></p>
                    </div>
                  </div>
                )}
              </div>

              {/* Phase 2: 시장 스캔 */}
              <div className="mt-6 pt-6 border-t">
                <h3 className="text-lg font-bold text-gray-800 mb-4">🔍 Phase 2: 시장 스캔</h3>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">매칭 임계값</label>
                    <input
                      type="number"
                      value={scanOptions.matchThreshold}
                      onChange={(e) => setScanOptions({ ...scanOptions, matchThreshold: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="0"
                      max="100"
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">최대 반환 개수</label>
                    <input
                      type="number"
                      value={scanOptions.limit}
                      onChange={(e) => setScanOptions({ ...scanOptions, limit: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="1"
                      max="50"
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">분석 기간 (일)</label>
                    <input
                      type="number"
                      value={scanOptions.days}
                      onChange={(e) => setScanOptions({ ...scanOptions, days: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="10"
                      max="60"
                    />
                  </div>
                </div>

                <button
                  onClick={scanMarket}
                  disabled={loading}
                  className="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 font-semibold"
                >
                  {loading ? '🔍 스캔 중...' : '🚀 현재 시장에서 매칭 종목 찾기'}
                </button>
              </div>
            </div>
          )}

          {/* 매칭된 종목 결과 */}
          {matchedStocks && (
            <div className="bg-white rounded-xl shadow-lg p-6">
              <h3 className="text-xl font-bold text-gray-800 mb-4">
                🎯 DNA 매칭 종목 ({matchedStocks.matchedStocks.length}개)
              </h3>

              {matchedStocks.matchedStocks.length === 0 ? (
                <div className="text-center py-8 text-gray-500">
                  <p className="mb-2">매칭되는 종목이 없습니다</p>
                  <p className="text-sm">임계값을 낮추거나 분석 기간을 조정해보세요</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {matchedStocks.matchedStocks.map((stock, index) => (
                    <div key={index} className="border rounded-lg p-4 hover:bg-gray-50">
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <h4 className="font-bold text-lg text-gray-800">
                            {stock.stockName} ({stock.stockCode})
                          </h4>
                          <p className="text-sm text-gray-600">
                            분석 일수: {stock.analyzedDays}일
                          </p>
                        </div>
                        <div className="text-right">
                          <p className="text-2xl font-bold text-purple-600">
                            {stock.matchScore}점
                          </p>
                          <p className="text-sm text-gray-500">매칭 점수</p>
                        </div>
                      </div>

                      {/* 점수 세부 */}
                      {stock.scoreDetails.volumeRate && (
                        <div className="bg-purple-50 p-3 rounded mb-2">
                          <p className="text-sm font-semibold text-gray-700 mb-1">거래량 증가율</p>
                          <div className="text-xs text-gray-600 space-y-1">
                            <p>• EMA 평균: {stock.scoreDetails.volumeRate.current.emaAvg.toFixed(2)}% (기준: {stock.scoreDetails.volumeRate.threshold.emaMin.toFixed(2)}%)</p>
                            <p>• 최근 5일: {stock.scoreDetails.volumeRate.current.recent5d.toFixed(2)}% (기준: {stock.scoreDetails.volumeRate.threshold.recent5dMin.toFixed(2)}%)</p>
                          </div>
                        </div>
                      )}

                      {/* 패턴 정보 */}
                      {stock.pattern.volumeRate && (
                        <div className="flex gap-2 text-xs">
                          <span className={`px-2 py-1 rounded ${stock.pattern.volumeRate.segmented.trend === 'accelerating'
                            ? 'bg-green-100 text-green-700'
                            : stock.pattern.volumeRate.segmented.trend === 'mixed'
                              ? 'bg-yellow-100 text-yellow-700'
                              : 'bg-gray-100 text-gray-700'
                            }`}>
                            트렌드: {stock.pattern.volumeRate.segmented.trend}
                          </span>
                          <span className={`px-2 py-1 rounded ${stock.pattern.volumeRate.urgency === 'high'
                            ? 'bg-red-100 text-red-700'
                            : stock.pattern.volumeRate.urgency === 'medium'
                              ? 'bg-orange-100 text-orange-700'
                              : 'bg-blue-100 text-blue-700'
                            }`}>
                            급등 임박성: {stock.pattern.volumeRate.urgency}
                          </span>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
