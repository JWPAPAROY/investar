    function StockAnalysis({ apiBaseUrl }) {
      const [inputText, setInputText] = useState('');
      const [results, setResults] = useState([]);
      const [aiEvaluation, setAiEvaluation] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedStock, setSelectedStock] = useState(null);
      const [strategyFilter, setStrategyFilter] = useState('momentum');
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [highlightIdx, setHighlightIdx] = useState(-1);
      const searchTimer = React.useRef(null);
      const inputRef = React.useRef(null);
      const [selectedChips, setSelectedChips] = useState([]); // [{code, name, market}]

      // 종목명 검색 (디바운스 300ms)
      const searchStocks = (query) => {
        if (searchTimer.current) clearTimeout(searchTimer.current);
        if (!query || query.length < 1) { setSuggestions([]); setShowSuggestions(false); return; }
        // 이미 6자리 코드면 검색 안함
        if (/^\d{6}$/.test(query.trim())) { setSuggestions([]); setShowSuggestions(false); return; }
        searchTimer.current = setTimeout(async () => {
          try {
            const res = await fetch(`${apiBaseUrl}/stocks?mode=search&q=${encodeURIComponent(query)}&limit=8`);
            const data = await res.json();
            if (data.success && data.results.length > 0) {
              // 이미 선택된 종목 제외
              const filtered = data.results.filter(r => !selectedChips.some(c => c.code === r.code));
              setSuggestions(filtered);
              setShowSuggestions(filtered.length > 0);
              setHighlightIdx(-1);
            } else {
              setSuggestions([]);
              setShowSuggestions(false);
            }
          } catch (e) { setSuggestions([]); setShowSuggestions(false); }
        }, 300);
      };

      const handleInputChange = (e) => {
        const val = e.target.value;
        setInputText(val);
        // 마지막 쉼표 이후의 텍스트만 검색
        const lastPart = val.split(',').pop().trim();
        searchStocks(lastPart);
      };

      const selectSuggestion = (item) => {
        setSelectedChips(prev => [...prev, item]);
        setInputText('');
        setSuggestions([]);
        setShowSuggestions(false);
        setHighlightIdx(-1);
        inputRef.current?.focus();
      };

      const removeChip = (code) => {
        setSelectedChips(prev => prev.filter(c => c.code !== code));
      };

      const analyzeStocks = async () => {
        // 칩 + 입력창의 코드 합산
        const chipCodes = selectedChips.map(c => c.code);
        const inputCodes = inputText.match(/\d{6}/g) || [];
        const allCodes = [...new Set([...chipCodes, ...inputCodes])];

        if (allCodes.length === 0) {
          setError('종목명 또는 6자리 종목코드를 입력해주세요');
          return;
        }
        if (allCodes.length > 15) {
          setError('최대 15개까지 분석 가능합니다.');
          return;
        }

        try {
          setLoading(true);
          setError(null);
          setResults([]);
          setAiEvaluation(null);
          setShowSuggestions(false);

          const response = await fetch(`${apiBaseUrl}/screening/analyze?codes=${allCodes.join(',')}`);
          const data = await response.json();

          if (data.success) {
            setResults((data.data || []).sort((a, b) => b.totalScore - a.totalScore));
            if (data.aiEvaluation) setAiEvaluation(data.aiEvaluation);
            if (data.errors && data.errors.length > 0) {
              setError(`일부 종목 분석 실패:\n${data.errors.map(e => `${e.code}: ${e.error}`).join('\n')}`);
            }
          } else {
            setError(data.error || '분석에 실패했습니다.');
          }
        } catch (err) {
          setError(`요청 실패: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (showSuggestions && suggestions.length > 0) {
          if (e.key === 'ArrowDown') { e.preventDefault(); setHighlightIdx(prev => Math.min(prev + 1, suggestions.length - 1)); return; }
          if (e.key === 'ArrowUp') { e.preventDefault(); setHighlightIdx(prev => Math.max(prev - 1, 0)); return; }
          if (e.key === 'Enter' && highlightIdx >= 0) { e.preventDefault(); selectSuggestion(suggestions[highlightIdx]); return; }
          if (e.key === 'Escape') { setShowSuggestions(false); return; }
        }
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!loading) analyzeStocks();
        }
        // Backspace로 마지막 칩 삭제
        if (e.key === 'Backspace' && inputText === '' && selectedChips.length > 0) {
          setSelectedChips(prev => prev.slice(0, -1));
        }
      };

      const hasValidCode = selectedChips.length > 0 || inputText.match(/\d{6}/);

      return (
        <div className="space-y-6">
          {/* 헤더 */}
          <div className="bg-gradient-to-r from-orange-500 to-red-500 rounded-xl shadow-lg p-4 md:p-6 text-white">
            <h2 className="text-2xl md:text-3xl font-bold mb-1 md:mb-2">🔎 종목 분석</h2>
            <p className="text-orange-100 text-sm md:text-base">
              종목명 또는 종목코드를 입력하면 스크리닝 엔진으로 분석합니다.
            </p>
          </div>

          {/* 입력 영역 */}
          <div className="bg-white rounded-xl shadow-lg p-4 md:p-6">
            <div className="flex gap-2 md:gap-3">
              <div className="flex-1 min-w-0 relative">
                <div className="flex flex-wrap gap-1 items-center px-3 py-2 md:px-4 md:py-2 border-2 border-gray-300 rounded-lg focus-within:border-indigo-500 bg-white"
                  onClick={() => inputRef.current?.focus()}>
                  {selectedChips.map(chip => (
                    <span key={chip.code} className="inline-flex items-center gap-1 px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded-full text-xs md:text-sm whitespace-nowrap">
                      {chip.name}
                      <button onClick={(e) => { e.stopPropagation(); removeChip(chip.code); }}
                        className="text-indigo-400 hover:text-indigo-700 font-bold ml-0.5">&times;</button>
                    </span>
                  ))}
                  <input
                    ref={inputRef}
                    type="text"
                    value={inputText}
                    onChange={handleInputChange}
                    onKeyDown={handleKeyDown}
                    onFocus={() => { if (suggestions.length > 0) setShowSuggestions(true); }}
                    onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                    placeholder={selectedChips.length > 0 ? '' : '삼성전자, 005930'}
                    className="flex-1 min-w-[80px] outline-none text-base md:text-lg bg-transparent py-0.5"
                  />
                </div>
                {/* 자동완성 드롭다운 */}
                {showSuggestions && suggestions.length > 0 && (
                  <div className="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                    {suggestions.map((item, idx) => (
                      <div key={item.code}
                        className={`px-3 py-2 cursor-pointer flex items-center gap-2 text-sm ${idx === highlightIdx ? 'bg-indigo-50' : 'hover:bg-gray-50'}`}
                        onMouseDown={(e) => { e.preventDefault(); selectSuggestion(item); }}>
                        <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${item.market === 'KOSDAQ' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                          {item.market}
                        </span>
                        <span className="font-medium">{item.name}</span>
                        <span className="text-gray-400 text-xs font-mono">{item.code}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button
                onClick={analyzeStocks}
                disabled={loading || !hasValidCode}
                className={`px-4 py-2 md:px-8 md:py-3 rounded-lg font-bold text-white transition-all whitespace-nowrap text-sm md:text-base self-start ${loading || !hasValidCode
                  ? 'bg-gray-400 cursor-not-allowed'
                  : 'bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg'
                  }`}
              >
                {loading ? '분석중...' : '분석'}
              </button>
            </div>
          </div>

          {/* 에러 */}
          {error && (
            <div className="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded shadow whitespace-pre-line">
              {error}
            </div>
          )}

          {/* 로딩 */}
          {loading && (
            <div className="text-center py-12">
              <div className="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
              <p className="mt-4 text-gray-600">
                종목 분석 중... (종목당 ~3초)
              </p>
            </div>
          )}

          {/* AI 종목 평가 */}
          {aiEvaluation && aiEvaluation.length > 0 && (
            <div className="bg-gradient-to-r from-violet-50 to-indigo-50 border border-violet-200 rounded-xl shadow p-4 md:p-5">
              <h3 className="font-bold text-violet-900 mb-3 flex items-center gap-2 text-base md:text-lg">
                <span className="text-lg">📊</span> 종목 매수 판단
              </h3>
              <div className="space-y-2">
                {aiEvaluation.map((ev, i) => {
                  const verdictStyle = {
                    '적극매수': 'bg-red-500 text-white',
                    '매수': 'bg-orange-500 text-white',
                    '관망': 'bg-gray-400 text-white',
                    '비추천': 'bg-blue-500 text-white',
                  }[ev.verdict] || 'bg-gray-300 text-gray-700';
                  return (
                    <div key={i} className="flex items-start gap-2 md:gap-3 py-2 border-b border-violet-100 last:border-0">
                      <span className={`shrink-0 px-2 py-0.5 rounded-full text-xs font-bold ${verdictStyle}`}>
                        {ev.verdict}
                      </span>
                      <div className="min-w-0">
                        <span className="font-semibold text-gray-900 text-sm">{ev.stockName}</span>
                        <span className="text-gray-600 text-xs md:text-sm ml-2">{ev.comment}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 결과 - RecommendationCard 재사용 */}
          {results.length > 0 && (
            <>
              <div className="bg-blue-50 border-l-4 border-blue-500 p-3 md:p-4 rounded">
                <div className="flex items-center justify-center gap-2 md:gap-6 text-xs md:text-sm">
                  <div>
                    <span className="text-gray-600">분석 완료:</span>
                    <span className="font-bold text-blue-900 ml-1">{results.length}개</span>
                  </div>
                  <div className="text-gray-400">|</div>
                  <div>
                    <span className="text-gray-600">{strategyFilter === 'defense' ? '방어점수순 정렬' : '점수순 정렬'}</span>
                  </div>
                </div>
              </div>
              <div className="flex justify-center gap-2 mb-4">
                {[
                  { key: 'momentum', label: '🔴 모멘텀', desc: '상승 모멘텀' },
                  { key: 'defense', label: '🛡️ 방어', desc: '하락 방어' },
                ].map(s => (
                  <button key={s.key} onClick={() => setStrategyFilter(s.key)}
                    className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all ${strategyFilter === s.key
                      ? s.key === 'momentum' ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'
                      : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                      }`} title={s.desc}>
                    {s.label}
                  </button>
                ))}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {results
                  .sort((a, b) => strategyFilter === 'defense'
                    ? (b.defenseScore || 0) - (a.defenseScore || 0)
                    : b.totalScore - a.totalScore)
                  .map((stock, index) => (
                    <RecommendationCard
                      key={stock.stockCode}
                      stock={stock}
                      rank={index + 1}
                      onClick={() => setSelectedStock(stock)}
                      strategyFilter={strategyFilter}
                    />
                  ))}
              </div>
            </>
          )}

          {/* 상세 모달 */}
          {selectedStock && (
            <StockDetailModal
              stock={selectedStock}
              onClose={() => setSelectedStock(null)}
            />
          )}
        </div>
      );
    }

    function DnaExtraction({ apiBaseUrl, recommendations = [] }) {
      const [stocks, setStocks] = useState([{ code: '', startDate: '', endDate: '' }]);
      const [extractedDNA, setExtractedDNA] = useState(null);
      const [matchedStocks, setMatchedStocks] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [scanOptions, setScanOptions] = useState({
        matchThreshold: 70,
        limit: 10,
        days: 25
      });
      const [autoRecommendations, setAutoRecommendations] = useState([]);
      const [fetchLoading, setFetchLoading] = useState(false);

      // 과열 종목 수동 조회
      const fetchOverheatedStocks = async () => {
        setFetchLoading(true);
        try {
          const response = await fetch(`${apiBaseUrl}/screening/recommend?market=ALL&limit=50`);
          const data = await response.json();
          if (data.success && data.recommendations) {
            setAutoRecommendations(data.recommendations);
          }
        } catch (err) {
          console.error('[DNA Tab] Failed to fetch recommendations:', err);
        } finally {
          setFetchLoading(false);
        }
      };

      // 종목 추가
      const addStock = () => {
        setStocks([...stocks, { code: '', startDate: '', endDate: '' }]);
      };

      // 종목 제거
      const removeStock = (index) => {
        if (stocks.length > 1) {
          const newStocks = stocks.filter((_, i) => i !== index);
          setStocks(newStocks);
        }
      };

      // 종목 정보 업데이트
      const updateStock = (index, field, value) => {
        const newStocks = [...stocks];
        newStocks[index][field] = value;
        setStocks(newStocks);
      };

      // DNA 추출
      const extractDNA = async () => {
        try {
          setLoading(true);
          setError(null);
          setExtractedDNA(null);
          setMatchedStocks(null);

          // 유효성 검사
          const validStocks = stocks.filter(s => s.code && s.startDate && s.endDate);
          if (validStocks.length === 0) {
            throw new Error('최소 2개 종목의 코드와 날짜를 입력하세요');
          }

          const response = await fetch(`${apiBaseUrl}/patterns/volume-dna`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mode: 'extract',
              stocks: validStocks
            })
          });

          const result = await response.json();

          if (result.success) {
            setExtractedDNA(result.result);
          } else {
            throw new Error(result.error || 'DNA 추출 실패');
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      // 시장 스캔
      const scanMarket = async () => {
        if (!extractedDNA) {
          setError('먼저 DNA를 추출하세요');
          return;
        }

        try {
          setLoading(true);
          setError(null);

          const response = await fetch(`${apiBaseUrl}/patterns/volume-dna`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              mode: 'scan',
              commonDNA: extractedDNA.commonDNA,
              options: scanOptions
            })
          });

          const result = await response.json();

          if (result.success) {
            setMatchedStocks(result.result);
          } else {
            throw new Error(result.error || '시장 스캔 실패');
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="space-y-6">
          {/* 헤더 */}
          <div className="bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl shadow-lg p-4 md:p-6 text-white">
            <h2 className="text-xl md:text-3xl font-bold mb-1 md:mb-2">🧬 거래량 DNA 추출</h2>
            <p className="text-purple-100 text-xs md:text-base">
              과거 급등주의 거래량 패턴에서 DNA를 추출하여 유사 종목을 찾습니다
            </p>
          </div>

          {error && (
            <div className="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded">
              {error}
            </div>
          )}

          {/* 과열 종목 표시 */}
          {(() => {
            const allRecs = recommendations.length > 0 ? recommendations : autoRecommendations;
            const warningStocks = allRecs
              .filter(stock => stock.recommendation?.grade === '과열')
              .sort((a, b) => b.totalScore - a.totalScore);

            if (allRecs.length === 0 && !fetchLoading) {
              return (
                <div className="bg-gray-50 border-2 border-gray-200 rounded-xl p-4 md:p-6 mb-4 md:mb-6 text-center">
                  <button
                    onClick={fetchOverheatedStocks}
                    className="px-4 py-2 md:px-6 md:py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg font-bold transition-all shadow-md hover:shadow-lg text-sm md:text-base"
                  >
                    ⚠️ 과열 종목 조회
                  </button>
                  <p className="text-gray-500 text-xs md:text-sm mt-2">스크리닝 데이터를 조회하여 과열 종목을 표시합니다</p>
                </div>
              );
            }

            if (fetchLoading) {
              return (
                <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-6 mb-6 text-center">
                  <div className="text-blue-600">🔄 과열 종목 데이터 로딩 중...</div>
                </div>
              );
            }

            if (warningStocks.length > 0) {
              return (
                <div className="bg-red-50 border-2 border-red-200 rounded-xl shadow-lg p-3 md:p-6 mb-4 md:mb-6">
                  <div className="flex items-center gap-2 mb-3 md:mb-4">
                    <span className="text-xl md:text-2xl">⚠️</span>
                    <h3 className="text-base md:text-xl font-bold text-red-800">
                      당일 과열 종목 ({warningStocks.length}개)
                    </h3>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full border-collapse">
                      <thead>
                        <tr className="bg-red-100 border-b-2 border-red-300">
                          <th className="px-4 py-2 text-left">종목명</th>
                          <th className="px-4 py-2 text-left">코드</th>
                          <th className="px-4 py-2 text-center">등급</th>
                          <th className="px-4 py-2 text-right">점수</th>
                          <th className="px-4 py-2 text-right">현재가</th>
                        </tr>
                      </thead>
                      <tbody>
                        {warningStocks.map((stock, index) => (
                          <tr key={stock.stockCode} className="border-b border-red-200 hover:bg-red-100 transition-colors">
                            <td className="px-4 py-2 font-medium">{stock.stockName}</td>
                            <td className="px-4 py-2 font-mono text-sm text-gray-700">{stock.stockCode}</td>
                            <td className="px-4 py-2 text-center">
                              <span className="px-2 py-1 bg-red-600 text-white rounded text-xs font-bold">
                                {stock.recommendation.grade}
                              </span>
                            </td>
                            <td className="px-4 py-2 text-right font-bold text-red-700">{stock.totalScore.toFixed(1)}점</td>
                            <td className="px-4 py-2 text-right font-semibold">{stock.currentPrice?.toLocaleString()}원</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>

                  <div className="text-xs text-gray-600 mt-4 bg-white p-3 rounded border border-red-200">
                    💡 <strong>사용 방법:</strong> 위 종목 코드를 복사하여 아래 DNA 추출 입력란에 붙여넣기하세요
                  </div>
                </div>
              );
            }
            return null;
          })()}

          {/* Phase 1: DNA 추출 */}
          <div className="bg-white rounded-xl shadow-lg p-4 md:p-6">
            <h3 className="text-lg md:text-xl font-bold text-gray-800 mb-3 md:mb-4">📊 Phase 1: DNA 추출</h3>
            <p className="text-xs md:text-sm text-gray-600 mb-3 md:mb-4">
              과거 급등했던 종목들의 거래량 패턴을 분석하여 공통 DNA를 추출합니다
            </p>

            {/* 종목 입력 폼 */}
            <div className="space-y-3 mb-4">
              {stocks.map((stock, index) => (
                <div key={index} className="flex flex-col md:flex-row gap-2">
                  <div className="flex gap-2 items-center">
                    <input
                      type="text"
                      placeholder="종목코드 (005930)"
                      value={stock.code}
                      onChange={(e) => updateStock(index, 'code', e.target.value)}
                      className="flex-1 min-w-0 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm"
                    />
                    {stocks.length > 1 && (
                      <button
                        onClick={() => removeStock(index)}
                        className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 flex-shrink-0 md:hidden"
                      >
                        ✕
                      </button>
                    )}
                  </div>
                  <div className="flex gap-2 items-center">
                    <input
                      type="text"
                      placeholder="시작일 (YYYYMMDD)"
                      value={stock.startDate}
                      onChange={(e) => updateStock(index, 'startDate', e.target.value)}
                      className="flex-1 min-w-0 md:w-40 md:flex-none px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm"
                    />
                    <input
                      type="text"
                      placeholder="종료일 (YYYYMMDD)"
                      value={stock.endDate}
                      onChange={(e) => updateStock(index, 'endDate', e.target.value)}
                      className="flex-1 min-w-0 md:w-40 md:flex-none px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 text-sm"
                    />
                    {stocks.length > 1 && (
                      <button
                        onClick={() => removeStock(index)}
                        className="px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 flex-shrink-0 hidden md:block"
                      >
                        ✕
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>

            <div className="flex gap-2">
              <button
                onClick={addStock}
                className="px-3 py-2 md:px-4 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm"
              >
                + 종목 추가
              </button>
              <button
                onClick={extractDNA}
                disabled={loading}
                className="px-4 py-2 md:px-6 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50 text-sm"
              >
                {loading ? '🔍 추출 중...' : '🧬 DNA 추출'}
              </button>
            </div>
          </div>

          {/* 추출된 DNA 결과 */}
          {extractedDNA && (
            <div className="bg-white rounded-xl shadow-lg p-3 md:p-6">
              <h3 className="text-xl font-bold text-gray-800 mb-4">✅ 추출된 DNA</h3>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div className="bg-purple-50 p-4 rounded-lg">
                  <p className="text-sm text-gray-600">DNA 강도</p>
                  <p className="text-xl md:text-2xl font-bold text-purple-600">{extractedDNA.dnaStrength}%</p>
                </div>
                <div className="bg-indigo-50 p-4 rounded-lg">
                  <p className="text-sm text-gray-600">분석 종목</p>
                  <p className="text-2xl font-bold text-indigo-600">{extractedDNA.basedOnStocks}개</p>
                </div>
              </div>

              {/* DNA 세부 정보 */}
              <div className="space-y-4">
                {extractedDNA.commonDNA.volumeRate && (
                  <div className="border-l-4 border-purple-500 pl-4">
                    <p className="font-semibold text-gray-800">거래량 증가율 DNA</p>
                    <div className="text-sm text-gray-600 mt-2 space-y-1">
                      <p>• 평균 EMA: <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.avgEMA.toFixed(2)}%</span></p>
                      <p>• 최근 5일 평균: <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.avgRecent5d.toFixed(2)}%</span></p>
                      <p>• 임계값 (EMA): <span className="font-semibold">{extractedDNA.commonDNA.volumeRate.threshold.emaMin.toFixed(2)}%</span></p>
                    </div>
                  </div>
                )}

                {extractedDNA.commonDNA.institutionFlow && (
                  <div className="border-l-4 border-indigo-500 pl-4">
                    <p className="font-semibold text-gray-800">기관 투자자 DNA</p>
                    <div className="text-sm text-gray-600 mt-2">
                      <p>• 평균 연속 매수: <span className="font-semibold">{extractedDNA.commonDNA.institutionFlow.avgConsecutiveDays}일</span></p>
                    </div>
                  </div>
                )}

                {extractedDNA.commonDNA.foreignFlow && (
                  <div className="border-l-4 border-blue-500 pl-4">
                    <p className="font-semibold text-gray-800">외국인 투자자 DNA</p>
                    <div className="text-sm text-gray-600 mt-2">
                      <p>• 평균 연속 매수: <span className="font-semibold">{extractedDNA.commonDNA.foreignFlow.avgConsecutiveDays}일</span></p>
                    </div>
                  </div>
                )}
              </div>

              {/* Phase 2: 시장 스캔 */}
              <div className="mt-6 pt-6 border-t">
                <h3 className="text-lg font-bold text-gray-800 mb-4">🔍 Phase 2: 시장 스캔</h3>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">매칭 임계값</label>
                    <input
                      type="number"
                      value={scanOptions.matchThreshold}
                      onChange={(e) => setScanOptions({ ...scanOptions, matchThreshold: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="0"
                      max="100"
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">최대 반환 개수</label>
                    <input
                      type="number"
                      value={scanOptions.limit}
                      onChange={(e) => setScanOptions({ ...scanOptions, limit: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="1"
                      max="50"
                    />
                  </div>
                  <div>
                    <label className="block text-sm text-gray-600 mb-1">분석 기간 (일)</label>
                    <input
                      type="number"
                      value={scanOptions.days}
                      onChange={(e) => setScanOptions({ ...scanOptions, days: parseInt(e.target.value) })}
                      className="w-full px-4 py-2 border rounded-lg"
                      min="10"
                      max="60"
                    />
                  </div>
                </div>

                <button
                  onClick={scanMarket}
                  disabled={loading}
                  className="w-full px-6 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 font-semibold"
                >
                  {loading ? '🔍 스캔 중...' : '🚀 현재 시장에서 매칭 종목 찾기'}
                </button>
              </div>
            </div>
          )}

          {/* 매칭된 종목 결과 */}
          {matchedStocks && (
            <div className="bg-white rounded-xl shadow-lg p-3 md:p-6">
              <h3 className="text-xl font-bold text-gray-800 mb-4">
                🎯 DNA 매칭 종목 ({matchedStocks.matchedStocks.length}개)
              </h3>

              {matchedStocks.matchedStocks.length === 0 ? (
                <div className="text-center py-8 text-gray-500">
                  <p className="mb-2">매칭되는 종목이 없습니다</p>
                  <p className="text-sm">임계값을 낮추거나 분석 기간을 조정해보세요</p>
                </div>
              ) : (
                <div className="space-y-4">
                  {matchedStocks.matchedStocks.map((stock, index) => (
                    <div key={index} className="border rounded-lg p-4 hover:bg-gray-50">
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <h4 className="font-bold text-lg text-gray-800">
                            {stock.stockName} ({stock.stockCode})
                          </h4>
                          <p className="text-sm text-gray-600">
                            분석 일수: {stock.analyzedDays}일
                          </p>
                        </div>
                        <div className="text-right">
                          <p className="text-xl md:text-2xl font-bold text-purple-600">
                            {stock.matchScore}점
                          </p>
                          <p className="text-sm text-gray-500">매칭 점수</p>
                        </div>
                      </div>

                      {/* 점수 세부 */}
                      {stock.scoreDetails.volumeRate && (
                        <div className="bg-purple-50 p-3 rounded mb-2">
                          <p className="text-sm font-semibold text-gray-700 mb-1">거래량 증가율</p>
                          <div className="text-xs text-gray-600 space-y-1">
                            <p>• EMA 평균: {stock.scoreDetails.volumeRate.current.emaAvg.toFixed(2)}% (기준: {stock.scoreDetails.volumeRate.threshold.emaMin.toFixed(2)}%)</p>
                            <p>• 최근 5일: {stock.scoreDetails.volumeRate.current.recent5d.toFixed(2)}% (기준: {stock.scoreDetails.volumeRate.threshold.recent5dMin.toFixed(2)}%)</p>
                          </div>
                        </div>
                      )}

                      {/* 패턴 정보 */}
                      {stock.pattern.volumeRate && (
                        <div className="flex gap-2 text-xs">
                          <span className={`px-2 py-1 rounded ${stock.pattern.volumeRate.segmented.trend === 'accelerating'
                            ? 'bg-green-100 text-green-700'
                            : stock.pattern.volumeRate.segmented.trend === 'mixed'
                              ? 'bg-yellow-100 text-yellow-700'
                              : 'bg-gray-100 text-gray-700'
                            }`}>
                            트렌드: {stock.pattern.volumeRate.segmented.trend}
                          </span>
                          <span className={`px-2 py-1 rounded ${stock.pattern.volumeRate.urgency === 'high'
                            ? 'bg-red-100 text-red-700'
                            : stock.pattern.volumeRate.urgency === 'medium'
                              ? 'bg-orange-100 text-orange-700'
                              : 'bg-blue-100 text-blue-700'
                            }`}>
                            급등 임박성: {stock.pattern.volumeRate.urgency}
                          </span>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
