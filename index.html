<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Volume Analyzer - AI 추천 종목</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    /* 모바일 테이블 가독성 */
    @media (max-width: 767px) {

      table th,
      table td {
        padding: 6px 8px !important;
        font-size: 12px !important;
        line-height: 1.4 !important;
      }

      table th {
        font-size: 11px !important;
      }
    }

    .stock-card {
      transition: all 0.3s ease;
    }

    .stock-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    .pulse-animation {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slide-in {
      animation: slideIn 0.5s ease-out;
    }

    .grade-과열 {
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
    }

    .grade-S\+ {
      background: linear-gradient(135deg, #ff0066 0%, #cc0044 100%);
    }

    .grade-S {
      background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
    }

    .grade-A {
      background: linear-gradient(135deg, #00cc00 0%, #008800 100%);
    }

    .grade-B {
      background: linear-gradient(135deg, #ffaa00 0%, #ff8800 100%);
    }

    .grade-C {
      background: linear-gradient(135deg, #ff9966 0%, #ff7744 100%);
    }

    .grade-D {
      background: linear-gradient(135deg, #cccccc 0%, #999999 100%);
    }
  </style>
</head>

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // API URL 자동 감지 (로컬 vs Vercel)
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:3001/api'
      : 'https://investar-xi.vercel.app/api';  // Vercel 배포 후 변경

    // 팩터별 기본 마감시각 (렌더 루프 외부에 1회 선언)
    // 서머타임 판별 (미국: 3월 둘째 일요일 ~ 11월 첫째 일요일)
    const _isDST = (() => {
      const now = new Date();
      const year = now.getFullYear();
      // 3월 둘째 일요일
      const mar1 = new Date(year, 2, 1);
      const dstStart = new Date(year, 2, 8 + (7 - mar1.getDay()) % 7);
      // 11월 첫째 일요일
      const nov1 = new Date(year, 10, 1);
      const dstEnd = new Date(year, 10, 1 + (7 - nov1.getDay()) % 7);
      return now >= dstStart && now < dstEnd;
    })();
    // 팩터별 기본 마감시각 (KST) — 서머타임 반영
    const DEFAULT_CLOSE_TIMES = {
      'KOSPI200F': '05:00', 'KOSDAQ150F': '05:00',
      '^SOX': _isDST ? '06:00' : '05:00',
      'NQ=F': _isDST ? '06:00' : '05:00', 'ES=F': _isDST ? '06:00' : '05:00',
      '^VIX': _isDST ? '05:15' : '04:15',
      'CL=F': _isDST ? '06:00' : '05:00',
      'GC=F': _isDST ? '06:30' : '05:30', 'HG=F': _isDST ? '06:30' : '05:30',
      'EWY': _isDST ? '06:00' : '05:00',
      'USDKRW=X': _isDST ? '06:00' : '05:00',
      '^TNX': _isDST ? '06:00' : '05:00',
      '^N225': '15:00'
    };

    // 팩터별 시장 개장 시각 (KST) — "다음 갱신" 표시용
    // open: 정규장 개장 KST, type: 'us_stock'(평일 밤만), 'us_futures'(일~금 거의 24h), 'kr'(평일), 'jp'(평일), 'fx'(24/5)
    const MARKET_OPEN_TIMES = {
      'KOSPI200F': { open: '18:00', type: 'kr' },     // 야간선물 18:00 개장
      'KOSDAQ150F': { open: '18:00', type: 'kr' },
      '^SOX': { open: _isDST ? '22:30' : '23:30', type: 'us_stock' },
      '^VIX': { open: _isDST ? '22:30' : '23:30', type: 'us_stock' },
      'EWY': { open: _isDST ? '22:30' : '23:30', type: 'us_stock' },
      '^TNX': { open: _isDST ? '21:00' : '22:00', type: 'us_stock' },
      'NQ=F': { open: _isDST ? '07:00' : '08:00', type: 'us_futures' },
      'ES=F': { open: _isDST ? '07:00' : '08:00', type: 'us_futures' },
      'CL=F': { open: _isDST ? '07:00' : '08:00', type: 'us_futures' },
      'GC=F': { open: _isDST ? '07:00' : '08:00', type: 'us_futures' },
      'HG=F': { open: _isDST ? '07:00' : '08:00', type: 'us_futures' },
      'USDKRW=X': { open: _isDST ? '07:00' : '08:00', type: 'fx' },
      '^N225': { open: '09:00', type: 'jp' },
    };

    // 다음 갱신 시각 계산 (KST 기준)
    function getNextUpdateLabel(factor) {
      const market = MARKET_OPEN_TIMES[factor.ticker];
      if (!market) return '';

      const now = new Date();
      const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
      const kstDay = kst.getUTCDay(); // 0=Sun, 6=Sat
      const kstH = kst.getUTCHours();
      const kstM = kst.getUTCMinutes();
      const kstTime = kstH * 60 + kstM;

      // 데이터 날짜 vs 오늘 비교
      const todayStr = kst.toISOString().slice(0, 10);
      const dataDateStr = factor.dataDate || '';
      const isToday = dataDateStr === todayStr;

      const [openH, openM] = market.open.split(':').map(Number);
      const openTime = openH * 60 + openM;

      // 미국 현물: 평일 밤에만 거래 (KST 23:30~06:00 익일)
      if (market.type === 'us_stock') {
        if (kstDay === 0) return '내일 ' + market.open;
        if (kstDay === 6) return '월요일 ' + market.open;
        // 06:00 이전 = 전날 밤 세션 진행 중
        if (kstTime < 6 * 60) return '거래중';
        // 06:00~23:30 = 마감, 다음 개장 대기
        if (kstTime < openTime) return '오늘 ' + market.open;
        // 23:30 이후 = 거래중
        return '거래중';
      }

      // 미국 선물: 월 08:00 KST ~ 토 07:00 KST (거의 24h)
      if (market.type === 'us_futures') {
        if (kstDay >= 1 && kstDay <= 5) return '거래중';
        if (kstDay === 0) return '내일 ' + market.open;
        if (kstDay === 6 && kstTime < 7 * 60) return '거래중';
        return '월요일 ' + market.open;
      }

      // 한국 야간선물: 평일 18:00~05:00 (익일)
      if (market.type === 'kr') {
        if (kstDay === 0) return '월요일 ' + market.open;
        if (kstDay === 6) return '월요일 ' + market.open;
        // 05:00 이전 = 전날 야간선물 세션 중
        if (kstTime < 5 * 60) return '거래중';
        // 05:00~18:00 = 마감, 다음 개장 대기
        if (kstTime < openTime) return '오늘 ' + market.open;
        // 18:00 이후 = 야간선물 거래중
        return '거래중';
      }

      // 일본: 평일 09:00~15:30
      if (market.type === 'jp') {
        if (kstDay === 0) return '내일 ' + market.open;
        if (kstDay === 6) return '월요일 ' + market.open;
        if (kstTime < openTime) return '오늘 ' + market.open;
        if (kstTime < 15 * 60 + 30) return '거래중';
        return '내일 ' + market.open;
      }

      // FX: 월~금 24시간
      if (market.type === 'fx') {
        if (kstDay >= 1 && kstDay <= 5) return '거래중';
        if (kstDay === 0) return '내일 ' + market.open;
        return '월요일 ' + market.open;
      }

      return '';
    }

    /**
     * 예측 히스토리 꺾은선 차트 (Canvas)
     * - 예측 스코어(파란 선) + KOSPI 실제 변동률(회색 선)
     * - 적중: 초록 점, 미적중: 빨간 점, 미확인: 회색 점
     */
    function PredictionChart({ history }) {
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const chartMapRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);

      useEffect(() => {
        if (!history || history.length < 2) return;
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);

        const scores = history.map(d => d.score);
        const kospiChanges = history.filter(d => d.kospiChange != null).map(d => d.kospiChange);
        const coreVals = [...scores, ...kospiChanges];
        const coreMin = Math.min(...coreVals, -0.5);
        const coreMax = Math.max(...coreVals, 0.5);
        // 밴드가 차트를 과도하게 압축하지 않도록, 코어 범위의 1.5배까지만 확장
        const bandMargin = (coreMax - coreMin) * 0.5;
        const minVal = Math.max(Math.min(...(history.filter(d => d.expectedChange).map(d => d.expectedChange.min)), coreMin), coreMin - bandMargin);
        const maxVal = Math.min(Math.max(...(history.filter(d => d.expectedChange).map(d => d.expectedChange.max)), coreMax), coreMax + bandMargin);
        const range = maxVal - minVal || 1;

        const pad = { top: 20, right: 12, bottom: 28, left: 36 };
        const chartW = w - pad.left - pad.right;
        const chartH = h - pad.top - pad.bottom;

        const toX = (i) => pad.left + (i / (history.length - 1)) * chartW;
        const toY = (v) => pad.top + (1 - (v - minVal) / range) * chartH;

        // 각 데이터 포인트의 실제 좌표 저장 (툴팁용)
        chartMapRef.current = history.map((d, i) => ({
          x: toX(i), y: toY(d.score),
        }));

        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0, 0, w, h);

        // 0 기준선
        const zeroY = toY(0);
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(pad.left, zeroY);
        ctx.lineTo(w - pad.right, zeroY);
        ctx.stroke();
        ctx.setLineDash([]);

        [0.5, -0.5, 0.2, -0.2].forEach((v, i) => {
          if (v > maxVal || v < minVal) return;
          const y = toY(v);
          ctx.strokeStyle = i < 2 ? '#e5e7eb' : '#f3f4f6';
          ctx.lineWidth = 0.5;
          ctx.setLineDash([2, 3]);
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(w - pad.right, y);
          ctx.stroke();
          ctx.setLineDash([]);
        });

        ctx.fillStyle = '#9ca3af';
        ctx.font = '10px monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        [maxVal, 0, minVal].forEach(v => {
          const label = (v >= 0 ? '+' : '') + v.toFixed(1);
          ctx.fillText(label, pad.left - 4, toY(v));
        });

        ctx.fillStyle = '#9ca3af';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        const labelIdxs = [0, Math.floor(history.length / 2), history.length - 1];
        labelIdxs.forEach(i => {
          const d = history[i].date;
          ctx.fillText(d.slice(5).replace('-', '/'), toX(i), h - pad.bottom + 6);
        });

        // 예측 밴드 영역 (반투명)
        ctx.fillStyle = 'rgba(59, 130, 246, 0.08)';
        ctx.beginPath();
        history.forEach((d, i) => {
          if (!d.expectedChange) return;
          const x = toX(i);
          const yMax = toY(d.expectedChange.max);
          if (i === 0) ctx.moveTo(x, yMax);
          else ctx.lineTo(x, yMax);
        });
        for (let i = history.length - 1; i >= 0; i--) {
          if (!history[i].expectedChange) continue;
          ctx.lineTo(toX(i), toY(history[i].expectedChange.min));
        }
        ctx.closePath();
        ctx.fill();

        // 밴드 상/하한선 (점선)
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
        ctx.lineWidth = 0.8;
        ctx.setLineDash([3, 3]);
        ['max', 'min'].forEach(key => {
          ctx.beginPath();
          let s = false;
          history.forEach((d, i) => {
            if (!d.expectedChange) return;
            const x = toX(i);
            const y = toY(d.expectedChange[key]);
            if (!s) { ctx.moveTo(x, y); s = true; }
            else ctx.lineTo(x, y);
          });
          ctx.stroke();
        });
        ctx.setLineDash([]);

        // KOSPI 실제 변동률 선
        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        let started = false;
        history.forEach((d, i) => {
          if (d.kospiChange == null) return;
          const x = toX(i);
          const y = toY(d.kospiChange);
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // 예측 스코어 선
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 2;
        ctx.beginPath();
        history.forEach((d, i) => {
          const x = toX(i);
          const y = toY(d.score);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // 적중/미적중 점
        history.forEach((d, i) => {
          const x = toX(i);
          const y = toY(d.score);
          ctx.beginPath();
          ctx.arc(x, y, 3.5, 0, Math.PI * 2);
          if (d.hit === true) ctx.fillStyle = '#22c55e';
          else if (d.hit === false) ctx.fillStyle = '#ef4444';
          else ctx.fillStyle = '#9ca3af';
          ctx.fill();
        });

        // 범례
        const legendY = 8;
        const items = [
          { color: '#3b82f6', label: '예측 스코어', type: 'line' },
          { color: 'rgba(59,130,246,0.15)', label: '예측 밴드', type: 'band' },
          { color: '#d1d5db', label: 'KOSPI 실제', type: 'line' },
          { color: '#22c55e', label: '적중', type: 'dot' },
          { color: '#ef4444', label: '미적중', type: 'dot' },
        ];
        ctx.font = '9px sans-serif';
        ctx.textBaseline = 'middle';
        let legendX = pad.left + 4;
        items.forEach(item => {
          if (item.type === 'line') {
            ctx.strokeStyle = item.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(legendX, legendY);
            ctx.lineTo(legendX + 14, legendY);
            ctx.stroke();
          } else if (item.type === 'band') {
            ctx.fillStyle = item.color;
            ctx.fillRect(legendX, legendY - 5, 14, 10);
          } else {
            ctx.beginPath();
            ctx.arc(legendX + 7, legendY, 3, 0, Math.PI * 2);
            ctx.fillStyle = item.color;
            ctx.fill();
          }
          ctx.fillStyle = '#6b7280';
          ctx.textAlign = 'left';
          ctx.fillText(item.label, legendX + 18, legendY);
          legendX += ctx.measureText(item.label).width + 30;
        });
      }, [history]);

      const findNearest = useCallback((clientX) => {
        const points = chartMapRef.current;
        const canvas = canvasRef.current;
        if (!points || !canvas || !history || history.length < 2) return null;

        const rect = canvas.getBoundingClientRect();
        const mouseX = clientX - rect.left;
        const scale = canvas.clientWidth / rect.width;
        const scaledX = mouseX * scale;

        let nearestIdx = 0, minDist = Infinity;
        points.forEach((p, i) => {
          const dist = Math.abs(scaledX - p.x);
          if (dist < minDist) { minDist = dist; nearestIdx = i; }
        });

        if (minDist > 40) return null;

        const d = history[nearestIdx];
        const pt = points[nearestIdx];
        return { x: pt.x + 8, y: pt.y + 8, d };
      }, [history]);

      const handleMouseMove = useCallback((e) => {
        setTooltip(findNearest(e.clientX));
      }, [findNearest]);

      const handleTouchMove = useCallback((e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) setTooltip(findNearest(touch.clientX));
      }, [findNearest]);

      if (!history || history.length < 2) return null;

      return (
        <div ref={containerRef} className="mt-3 bg-white rounded-lg p-2 border border-gray-200 relative">
          <canvas
            ref={canvasRef}
            role="img"
            aria-label="예측 스코어 추이 차트 — 최근 30거래일 예측 스코어와 KOSPI 실제 지수"
            onMouseMove={handleMouseMove}
            onMouseLeave={() => setTooltip(null)}
            onTouchStart={handleTouchMove}
            onTouchMove={handleTouchMove}
            onTouchEnd={() => setTooltip(null)}
            style={{ width: '100%', height: '280px', display: 'block', cursor: 'crosshair', touchAction: 'none' }}
          />
          {tooltip && (
            <div
              className="absolute bg-gray-900 text-white text-xs rounded-lg px-3 py-2 pointer-events-none shadow-lg z-10"
              style={{
                left: `${tooltip.x}px`,
                top: `${Math.max(tooltip.y - 70, 4)}px`,
                transform: tooltip.x > (containerRef.current?.clientWidth || 300) * 0.75
                  ? 'translateX(-105%)' : tooltip.x < 60 ? 'translateX(5%)' : 'translateX(-50%)',
              }}
            >
              <div className="font-bold mb-1">{tooltip.d.date}</div>
              <div className="flex justify-between gap-3">
                <span className="text-blue-300">예측 스코어:</span>
                <span className="font-mono">{tooltip.d.score >= 0 ? '+' : ''}{tooltip.d.score.toFixed(3)}</span>
              </div>
              {tooltip.d.expectedChange && (
                <div className="flex justify-between gap-3">
                  <span className="text-blue-200">예측 범위:</span>
                  <span className="font-mono text-blue-200">
                    {tooltip.d.expectedChange.min >= 0 ? '+' : ''}{tooltip.d.expectedChange.min}% ~ {tooltip.d.expectedChange.max >= 0 ? '+' : ''}{tooltip.d.expectedChange.max}%
                  </span>
                </div>
              )}
              {tooltip.d.kospiClose != null && tooltip.d.expectedChange && (
                <div className="flex justify-between gap-3">
                  <span className="text-blue-200">예측 지수:</span>
                  <span className="font-mono text-blue-200">
                    {Math.round(tooltip.d.kospiClose * (1 + tooltip.d.expectedChange.min / 100)).toLocaleString()} ~ {Math.round(tooltip.d.kospiClose * (1 + tooltip.d.expectedChange.max / 100)).toLocaleString()}
                  </span>
                </div>
              )}
              <div className="border-t border-gray-600 my-1"></div>
              {tooltip.d.kospiChange != null && (
                <div className="flex justify-between gap-3">
                  <span className="text-gray-300">실제 변동:</span>
                  <span className={`font-mono ${tooltip.d.kospiChange >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {tooltip.d.kospiChange >= 0 ? '+' : ''}{tooltip.d.kospiChange.toFixed(2)}%
                  </span>
                </div>
              )}
              {tooltip.d.kospiClose != null && tooltip.d.kospiChange != null && (
                <div className="flex justify-between gap-3">
                  <span className="text-gray-300">KOSPI 종가:</span>
                  <span className={`font-mono font-bold ${tooltip.d.kospiChange >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                    {Math.round(tooltip.d.kospiClose * (1 + tooltip.d.kospiChange / 100)).toLocaleString()}
                  </span>
                </div>
              )}
              {tooltip.d.hit === true && <div className="text-green-400 text-center mt-1">✅ 적중</div>}
              {tooltip.d.hit === false && <div className="text-red-400 text-center mt-1">❌ 미적중</div>}
              {tooltip.d.hit == null && <div className="text-gray-400 text-center mt-1">⏳ 결과 대기</div>}
            </div>
          )}
        </div>
      );
    }

    // 메인 앱
    function App() {
      const [recommendations, setRecommendations] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedStock, setSelectedStock] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [activeTab, setActiveTab] = useState('prediction'); // prediction, screening, performance, analyze, dna
      const [screeningMetadata, setScreeningMetadata] = useState(null); // 스크리닝 메타데이터
      const [screeningDuration, setScreeningDuration] = useState(null); // 스크리닝 소요 시간(초)
      const [top3Recommendations, setTop3Recommendations] = useState([]); // 🆕 TOP 3 추천 종목
      const [defenseTop3Recommendations, setDefenseTop3Recommendations] = useState([]); // v3.34: 방어 TOP 3
      const [strategyFilter, setStrategyFilter] = useState('momentum'); // v3.34: momentum, defense, all
      const [prediction, setPrediction] = useState(null); // 해외 시장 기반 전망

      // 데이터 캐싱
      const [cachedData, setCachedData] = useState(null);

      // 성과 검증 데이터 상태 (캐싱용)
      const [trackerData, setTrackerData] = useState(null);
      const [performanceLoading, setPerformanceLoading] = useState(false);
      const [performanceError, setPerformanceError] = useState(null);

      // 패턴 분석 데이터 상태
      const [patternAnalysis, setPatternAnalysis] = useState(null);
      const [patternLoading, setPatternLoading] = useState(false);

      const [predictionLoading, setPredictionLoading] = useState(false);
      const [predictionElapsed, setPredictionElapsed] = useState(0);

      // 전망 로딩 타이머
      useEffect(() => {
        let timer;
        if (predictionLoading) {
          timer = setInterval(() => setPredictionElapsed(prev => prev + 1), 1000);
        } else {
          setPredictionElapsed(0);
        }
        return () => clearInterval(timer);
      }, [predictionLoading]);

      // 버튼 클릭으로 분석 시작 (자동 로드 제거)

      const fetchPrediction = async () => {
        setPredictionLoading(true);
        setPredictionElapsed(0);
        try {
          const r = await fetch(`${API_BASE_URL}/screening/prediction`);
          const result = await r.json();
          if (result.success && result.prediction) {
            setPrediction(result.prediction);
          }
        } catch (error) {
          console.error("해외 전망 로드 실패:", error);
        } finally {
          setPredictionLoading(false);
        }
      };

      // 추천 종목을 Supabase에 저장 (성과 추적용)
      // ⚠️ v3.10.3부터 프론트엔드 자동 저장 제거 - Cron만 저장
      // 실제 저장 기준: 50점+ (save-daily-recommendations.js, v3.35에서 상한 제거)
      const saveRecommendationsToSupabase = async (stocks) => {
        try {
          // v3.35: 50점+ 전체 저장 (상한 제거)
          const stocksToSave = stocks.filter(s => s.totalScore >= 50);

          if (stocksToSave.length === 0) {
            console.log('저장할 추천 종목 없음 (50점 이상 범위 없음)');
            return;
          }

          const response = await fetch(`${API_BASE_URL}/recommendations/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stocks: stocksToSave })
          });

          const result = await response.json();

          if (result.success) {
            console.log(`✅ ${result.saved}개 추천 종목 저장 완료 (${result.date})`);
          } else {
            console.warn('추천 종목 저장 실패:', result.message);
          }
        } catch (err) {
          console.warn('Supabase 저장 실패 (무시):', err.message);
        }
      };

      // 추천 종목 불러오기
      const fetchRecommendations = async () => {
        try {
          setLoading(true);
          setError(null);
          setScreeningDuration(null);
          const startTime = Date.now();

          const url = `${API_BASE_URL}/screening/recommend`;

          const response = await fetch(url);
          const result = await response.json();

          if (result.success) {
            const stocks = result.recommendations || [];
            // ⭐ 안전장치: 프론트엔드에서도 점수 내림차순 정렬 (백엔드 정렬 보강)
            stocks.sort((a, b) => b.totalScore - a.totalScore);
            setRecommendations(stocks);
            setTop3Recommendations(result.top3 || []); // 🆕 TOP 3 추천 종목 저장
            setDefenseTop3Recommendations(result.defenseTop3 || []); // v3.34
            setPrediction(result.prediction || null);
            setScreeningMetadata(result.metadata || null);
            setScreeningDuration(((Date.now() - startTime) / 1000).toFixed(1));
            setLastUpdate(new Date());

            // 캐시에 저장
            setCachedData({
              recommendations: stocks,
              top3: result.top3 || [],
              defenseTop3: result.defenseTop3 || [],
              metadata: result.metadata || null,
              timestamp: new Date()
            });

            // ⭐ v3.10.3: 프론트엔드 자동 저장 제거 (Cron만 저장)
            // Cron Job(16:10 KST)이 장마감 종가 기준으로만 저장 → 백테스트 정확도 향상
          } else {
            setError(result.error || '데이터 로드 실패');
          }
        } catch (err) {
          setError('서버와 연결할 수 없습니다: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      // 성과 검증 데이터 불러오기
      const fetchPerformanceData = async () => {
        setPerformanceLoading(true);
        setPerformanceError(null);

        try {
          // Supabase 기반 실전 추천 종목 성과 조회
          const perfRes = await fetch(`${API_BASE_URL}/recommendations/performance?days=10`);

          if (!perfRes.ok) {
            throw new Error(`API 오류: ${perfRes.status}`);
          }

          const perfData = await perfRes.json();

          if (!perfData.success) {
            throw new Error(perfData.message || '데이터 로드 실패');
          }

          // 데이터 없으면 안내
          if (perfData.count === 0) {
            setTrackerData({
              statistics: {
                overall: {
                  totalSignals: 0,
                  winRate: 0,
                  avgReturn: 0,
                  totalCount: 0,
                  winCount: 0,
                  maxReturn: 0,
                  minReturn: 0
                }
              },
              stocks: [],
              isEmpty: true
            });
            setPerformanceLoading(false);
            return;
          }

          // 등급별 통계 계산 (stock_code 기준 최신 추천만 — 중복 제거)
          const byGrade = {};
          const gradeSeenCodes = {};
          // 최신순 정렬 후 stock_code 기준 dedup
          const sortedByDate = [...perfData.stocks].sort((a, b) => new Date(b.recommendation_date) - new Date(a.recommendation_date));
          sortedByDate.forEach(stock => {
            const grade = stock.recommendation_grade;
            if (!byGrade[grade]) {
              byGrade[grade] = { count: 0, winCount: 0, returns: [], maxReturn: 0 };
              gradeSeenCodes[grade] = new Set();
            }
            if (gradeSeenCodes[grade].has(stock.stock_code)) return;
            gradeSeenCodes[grade].add(stock.stock_code);
            byGrade[grade].count++;
            if (stock.is_winning) byGrade[grade].winCount++;
            byGrade[grade].returns.push(stock.current_return);
            if (stock.current_return > byGrade[grade].maxReturn) {
              byGrade[grade].maxReturn = stock.current_return;
            }
          });

          // 등급별 평균 계산 (기하평균 — 백엔드와 동일)
          const calcGeoMean = (returns) => {
            if (!returns || returns.length === 0) return 0;
            const product = returns.reduce((acc, r) => acc * (1 + r / 100), 1);
            return (Math.pow(product, 1 / returns.length) - 1) * 100;
          };
          const gradeStats = {};
          Object.entries(byGrade).forEach(([grade, data]) => {
            gradeStats[grade] = {
              count: data.count,
              winRate: ((data.winCount / data.count) * 100).toFixed(1),
              avgReturn: calcGeoMean(data.returns).toFixed(2),
              maxReturn: data.maxReturn.toFixed(2)
            };
          });

          // 연속 급등주 필터링 (2일 이상 연속 상승)
          const risingStocks = perfData.stocks.filter(s => s.is_rising);

          // ⭐ 전체 종목을 점수 내림차순으로 정렬
          const sortedStocks = [...perfData.stocks].sort((a, b) => b.total_score - a.total_score);

          setTrackerData({
            statistics: {
              overall: {
                totalSignals: perfData.count,
                totalCount: perfData.count,
                winRate: perfData.statistics.winRate,
                winCount: perfData.statistics.winningCount,
                avgReturn: perfData.statistics.avgReturn,
                maxReturn: perfData.statistics.maxReturn,
                minReturn: perfData.statistics.minReturn
              },
              byGrade: gradeStats,
              byCategory: perfData.statistics?.byCategory || {}
            },
            stocks: sortedStocks,
            risingStocks: risingStocks,
            recommendationDates: perfData.recommendationDates || [],
            commonStocks: perfData.commonStocks || [],
            parameters: {
              holdingDays: 'N/A (실시간)',
              lookbackDays: 7
            }
          });

          // 🆕 패턴 분석 데이터 로드 (비동기, 별도 로딩)
          setPatternLoading(true);
          fetch(`${API_BASE_URL}/patterns`)
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                setPatternAnalysis(data);
              }
            })
            .catch(err => console.warn('패턴 분석 로드 실패:', err))
            .finally(() => setPatternLoading(false));

        } catch (err) {
          console.error('성과 데이터 로드 실패:', err);
          setPerformanceError('성과 데이터 로드 실패: ' + err.message);
        } finally {
          setPerformanceLoading(false);
        }
      };

      // 종목 상세 분석 (API 호출 없이 recommendations 데이터 사용)
      const fetchStockDetail = (stockCode) => {
        const stock = recommendations.find(s => s.stockCode === stockCode);
        if (stock) {
          setSelectedStock(stock);
        } else {
          console.error('종목 데이터를 찾을 수 없습니다:', stockCode);
        }
      };

      // 초기 로드 제거 (수동 버튼 클릭으로만 실행)
      // useEffect(() => {
      //   fetchRecommendations();
      // }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
          {/* 헤더 */}
          <header className="bg-white shadow-lg border-b-4 border-indigo-600">
            <div className="max-w-7xl mx-auto px-3 md:px-4 py-3 md:py-6">
              <div className="flex items-center justify-between gap-3">
                <div className="min-w-0">
                  <h1 className="text-2xl md:text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                    🤖 AI Stock Screener
                  </h1>
                  <p className="text-gray-600 mt-1 md:mt-2 text-xs md:text-base">거래량 AI가 추천하는 오늘의 종목</p>
                </div>
                <button
                  onClick={() => {
                    window.location.reload(true);
                  }}
                  className="px-3 py-2 md:px-6 md:py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition font-semibold shadow-lg text-sm md:text-base whitespace-nowrap flex-shrink-0"
                >
                  🔄 새로고침
                </button>
              </div>
              {/* 탭 메뉴 */}
              <div className="flex gap-1 md:gap-4 mt-4 md:mt-6 border-b border-gray-200 overflow-x-auto">
                <button
                  onClick={() => setActiveTab('prediction')}
                  className={`px-2 py-2 md:px-6 md:py-3 text-xs md:text-base font-semibold transition-all whitespace-nowrap ${activeTab === 'prediction'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  🌏 오늘의 시장 전망
                </button>
                <button
                  onClick={() => setActiveTab('screening')}
                  className={`px-2 py-2 md:px-6 md:py-3 text-xs md:text-base font-semibold transition-all whitespace-nowrap ${activeTab === 'screening'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  📊 스크리닝
                </button>
                <button
                  onClick={() => {
                    setActiveTab('performance');
                  }}
                  className={`px-2 py-2 md:px-6 md:py-3 text-xs md:text-base font-semibold transition-all whitespace-nowrap ${activeTab === 'performance'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  📈 성과 검증
                </button>
                <button
                  onClick={() => setActiveTab('analyze')}
                  className={`px-2 py-2 md:px-6 md:py-3 text-xs md:text-base font-semibold transition-all whitespace-nowrap ${activeTab === 'analyze'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  🔎 종목 분석
                </button>
                <button
                  onClick={() => setActiveTab('dna')}
                  className={`px-2 py-2 md:px-6 md:py-3 text-xs md:text-base font-semibold transition-all whitespace-nowrap ${activeTab === 'dna'
                    ? 'text-indigo-600 border-b-4 border-indigo-600'
                    : 'text-gray-500 hover:text-gray-700'
                    }`}
                >
                  🧬 DNA 추출
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-3 md:px-4 py-4 md:py-8">
            {/* 에러 메시지 */}
            {error && (
              <div className="bg-red-100 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4 shadow">
                <div className="flex justify-between">
                  <span>{error}</span>
                  <button onClick={() => setError(null)} className="font-bold">×</button>
                </div>
              </div>
            )}

            {/* 탭별 콘텐츠 */}
            {activeTab === 'dna' ? (
              <DnaExtraction apiBaseUrl={API_BASE_URL} recommendations={recommendations} />
            ) : activeTab === 'analyze' ? (
              <StockAnalysis apiBaseUrl={API_BASE_URL} />
            ) : activeTab === 'screening' ? (
              <>
                {/* 마지막 업데이트 시간 */}
                {lastUpdate && (
                  <div className="text-sm text-gray-600 mb-4 text-center">
                    마지막 업데이트: {lastUpdate.toLocaleString('ko-KR')}
                  </div>
                )}

                {/* 스크리닝 메타데이터 */}
                {screeningMetadata && recommendations.length > 0 && (
                  <div className="bg-blue-50 border-l-4 border-blue-500 p-3 md:p-4 mb-4 rounded">
                    <div className="flex items-center justify-center gap-2 md:gap-6 text-xs md:text-sm flex-wrap">
                      <div>
                        <span className="text-gray-600">분석:</span>
                        <span className="font-bold text-blue-900 ml-1">{screeningMetadata.totalAnalyzed}개</span>
                      </div>
                      <div className="text-gray-400">|</div>
                      <div>
                        <span className="text-gray-600">조건 충족:</span>
                        <span className="font-bold text-green-700 ml-1">{screeningMetadata.totalFound}개</span>
                      </div>
                      <div className="text-gray-400">|</div>
                      <div>
                        <span className="text-gray-600">표시:</span>
                        <span className="font-bold text-indigo-700 ml-1">{screeningMetadata.returned}개</span>
                      </div>
                      {screeningMetadata.poolSize && (
                        <>
                          <div className="text-gray-400">|</div>
                          <div>
                            <span className="text-gray-600">풀 크기:</span>
                            <span className="font-bold text-purple-700 ml-1">{screeningMetadata.poolSize}개</span>
                          </div>
                        </>
                      )}
                      {screeningDuration && (
                        <>
                          <div className="text-gray-400">|</div>
                          <div>
                            <span className="text-gray-600">소요:</span>
                            <span className="font-bold text-orange-600 ml-1">{screeningDuration}초</span>
                          </div>
                        </>
                      )}
                    </div>
                    <p className="text-xs text-gray-500 text-center mt-2">
                      종목 풀: 거래량증가율 + 거래량 + 거래대금 + 거래회전율 + 등락률 (각 30개 × 5 API) → ETF/ETN 제거 → 중복 제거 → 분석 대상
                    </p>
                  </div>
                )}

                {/* 시장 전망 경고 배너 — 하락 예측 시 스크리닝 탭에 표시 */}
                {prediction && prediction.signal && prediction.signal.includes('bearish') && (() => {
                  const _sign = prediction.score >= 0 ? '+' : '';
                  const _scoreValue = `${_sign}${prediction.score.toFixed(2)}`;
                  return (
                  <div className={`border-2 rounded-xl p-3 mb-4 text-center ${
                    prediction.signal === 'strong_bearish'
                      ? 'bg-blue-50 border-blue-400'
                      : 'bg-amber-50 border-amber-300'
                  }`}>
                    <div className="flex items-center justify-center gap-2 text-sm font-bold">
                      <span>{prediction.emoji}</span>
                      <span className={prediction.signal === 'strong_bearish' ? 'text-blue-700' : 'text-amber-700'}>
                        시장 전망 스코어 : {_scoreValue}
                      </span>
                    </div>
                    <p className="text-xs text-gray-600 mt-1">
                      {prediction.signal === 'strong_bearish'
                        ? '해외 지수 급락 — 모멘텀 매수 신중, 방어 전략 또는 관망 권장'
                        : '해외 지수 약세 — 포지션 축소 또는 분할 매수 고려'}
                    </p>
                  </div>
                  );
                })()}

                {/* v3.34: 전략 필터 토글 */}
                {lastUpdate && recommendations.length > 0 && (
                  <div className="flex justify-center gap-2 mb-4">
                    {[
                      { key: 'momentum', label: '🔴 모멘텀', desc: '상승 모멘텀' },
                      { key: 'defense', label: '🛡️ 방어', desc: '하락 방어' },
                      { key: 'all', label: '📊 전체', desc: '모두 표시' }
                    ].map(s => (
                      <button
                        key={s.key}
                        onClick={() => setStrategyFilter(s.key)}
                        className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all ${strategyFilter === s.key
                          ? s.key === 'momentum' ? 'bg-red-500 text-white' : s.key === 'defense' ? 'bg-blue-500 text-white' : 'bg-gray-700 text-white'
                          : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                          }`}
                        title={s.desc}
                      >
                        {s.label}
                      </button>
                    ))}
                  </div>
                )}

                {/* 🆕 TOP 3 추천 종목 섹션 - 전략별 분리 */}
                {lastUpdate && (() => {
                  const showMomentum = strategyFilter === 'momentum' || strategyFilter === 'all';
                  const showDefense = strategyFilter === 'defense' || strategyFilter === 'all';
                  const activeTop3 = strategyFilter === 'defense' ? defenseTop3Recommendations : top3Recommendations;

                  return (
                    <div className="space-y-4 mb-8">
                      {/* 모멘텀 TOP 3 */}
                      {showMomentum && (
                        <div className="bg-gradient-to-r from-yellow-50 to-orange-50 border-2 border-yellow-300 rounded-xl p-3 md:p-6">
                          <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-2 md:gap-3 min-w-0">
                              <span className="text-2xl md:text-3xl flex-shrink-0">🏆</span>
                              <div className="min-w-0">
                                <h3 className="text-lg md:text-2xl font-bold text-orange-800">모멘텀 TOP 3</h3>
                                <p className="text-xs md:text-sm text-orange-600 mt-1">(매수고래 or 기관≥3일 or 외국인≥3일) + 비과열 + 이격도{'<'}150 + |등락률|{'<'}25%</p>
                              </div>
                            </div>
                            {top3Recommendations.length > 0 && (
                              <div className="bg-orange-600 text-white px-4 py-2 rounded-full font-bold text-lg">{top3Recommendations.length}개</div>
                            )}
                          </div>
                          {top3Recommendations.length > 0 ? (
                            <>
                              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                                {top3Recommendations.map((stock, index) => (
                                  <div key={stock.stockCode} className="bg-white border-2 border-yellow-400 rounded-lg p-4 cursor-pointer hover:shadow-xl transition-all duration-200 transform hover:-translate-y-1" onClick={() => fetchStockDetail(stock.stockCode)}>
                                    <div className="flex items-center justify-between mb-2">
                                      <div className="flex items-center gap-2">
                                        <span className="text-2xl font-bold text-orange-600">#{index + 1}</span>
                                        <span className="text-lg font-bold text-gray-800">{stock.stockName}</span>
                                      </div>
                                      <span className={`px-2 py-1 rounded text-xs font-bold ${stock.recommendation.grade === 'S+' ? 'bg-purple-100 text-purple-700' : stock.recommendation.grade === 'S' ? 'bg-red-100 text-red-700' : stock.recommendation.grade === 'A' ? 'bg-orange-100 text-orange-700' : 'bg-yellow-100 text-yellow-700'}`}>{stock.recommendation.grade}</span>
                                    </div>
                                    <div className="space-y-2 text-sm">
                                      <div className="flex justify-between"><span className="text-gray-600">현재가</span><span className="font-bold">{stock.currentPrice.toLocaleString()}원</span></div>
                                      <div className="flex justify-between"><span className="text-gray-600">종합 점수</span><span className="font-bold text-orange-600">{stock.totalScore.toFixed(1)}점</span></div>

    function ScoreItem({ name, score, color, detail, tooltip, showSign, bgClass }) {
      const [showTip, setShowTip] = useState(false);
      const colorMap = {
        blue: { text: 'text-blue-700', negText: 'text-red-600' },
        green: { text: 'text-green-700' },
        orange: { text: 'text-orange-700' },
        red: { text: 'text-red-700' }
      };
      const c = colorMap[color] || colorMap.blue;
      const scoreColor = (showSign && score < 0) ? (c.negText || 'text-red-600') : (score === 0 ? 'text-gray-400' : c.text);
      const prefix = showSign && score > 0 ? '+' : '';

      return (
        <div className={`p-3 rounded-lg border relative ${bgClass || 'bg-white border-gray-200'}`}>
          <div className="flex justify-between items-center mb-1">
            <span className="text-sm font-semibold text-gray-800">
              {name}
              {tooltip && (
                <span
                  className="ml-1 text-blue-400 cursor-help text-xs"
                  onMouseEnter={() => setShowTip(true)}
                  onMouseLeave={() => setShowTip(false)}
                >ⓘ</span>
              )}
            </span>
            <span className={`font-bold ${scoreColor}`}>{prefix}{score}점</span>
          </div>
          {detail && <p className={`text-xs ${color === 'red' ? 'text-red-600' : 'text-gray-600'}`}>{detail}</p>}
          {tooltip && showTip && (
            <div className="absolute z-50 bg-gray-800 text-white text-xs rounded-lg p-3 shadow-xl w-72 md:w-80 max-w-[calc(100vw-3rem)] left-0 top-full mt-2">
              {tooltip}
            </div>
          )}

      );

                      <div className="text-xl md:text-2xl font-bold text-purple-700">{patternAnalysis.totalPatterns}</div>
                      <div className="text-xs text-gray-600">수집된 패턴</div>

                    <div className="bg-white p-3 rounded-lg border border-purple-200 text-center">

                      </div>
                      <div className="text-xs text-gray-600">최근 30일 평균</div>
                    </div>
                    <div className="bg-white p-3 rounded-lg border border-purple-200 text-center">
                      <div className="text-xl md:text-2xl font-bold text-blue-600">

                      </div>
                      <div className="text-xs text-gray-600">최근 30일 성공</div>
                    </div>
                    <div className="bg-white p-3 rounded-lg border border-purple-200 text-center">

                  {/* 신호별 효과 */}

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">

                          <div className="flex justify-between text-xs">

            const uniqueDates = trackerData.stocks
              ? [...new Set(trackerData.stocks.map(s => s.recommendation_date))].sort().reverse()

            const recent5Dates = uniqueDates.slice(0, 5);

            const top3Stocks = trackerData.stocks ? trackerData.stocks.filter(stock => {
              const isRecent = recent5Dates.includes(stock.recommendation_date);
              const isNotDayZero = (stock.days_since_recommendation || 0) > 0;
              return stock.is_top3 && isRecent && isNotDayZero;
            }) : [];

            // TOP 3 통계 계산
            const top3WinCount = top3Stocks.filter(s => s.is_winning).length;
            const top3WinRate = top3Stocks.length > 0 ? (top3WinCount / top3Stocks.length * 100) : 0;
            const top3AvgReturn = top3Stocks.length > 0
              ? top3Stocks.reduce((sum, s) => sum + s.current_return, 0) / top3Stocks.length
              : 0;
            const top3MaxReturn = top3Stocks.length > 0
              ? Math.max(...top3Stocks.map(s => s.current_return))
              : 0;

            return top3Stocks.length > 0 ? (
              <div className="bg-gradient-to-r from-yellow-50 to-orange-50 border-2 border-yellow-300 rounded-xl p-3 md:p-6">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2 md:gap-3 min-w-0">
                    <span className="text-2xl md:text-3xl flex-shrink-0">🏆</span>
                    <div className="min-w-0">
                      <h3 className="text-lg md:text-2xl font-bold text-orange-800">TOP 3 전략 성과</h3>
                      <p className="text-xs md:text-sm text-orange-600 mt-1">
                        (매수고래/기관3+/외국인3+) + 비과열 → 점수 내림차순 실전 성과
                      </p>
                    </div>
                  </div>
                  <div className="bg-orange-600 text-white px-4 py-2 rounded-full font-bold text-lg">
                    {top3Stocks.length}개
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">승률</div>
                    <div className={`text-2xl font-bold ${top3WinRate >= 70 ? 'text-green-600' : top3WinRate >= 50 ? 'text-orange-600' : 'text-red-600'}`}>
                      {top3WinRate.toFixed(1)}%
                    </div>
                    <div className="text-xs text-gray-500 mt-1">
                      {top3WinCount}승 {top3Stocks.length - top3WinCount}패

                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">평균 수익률</div>
                    <div className={`text-2xl font-bold ${top3AvgReturn > 0 ? 'text-green-600' : 'text-red-600'}`}>
                      {top3AvgReturn > 0 ? '+' : ''}{top3AvgReturn.toFixed(2)}%
                    </div>
                  </div>

                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">최고 수익</div>
                    <div className="text-xl md:text-2xl font-bold text-purple-600">
                      +{top3MaxReturn.toFixed(2)}%
                    </div>
                  </div>

                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">샘플 수</div>
                    <div className="text-xl md:text-2xl font-bold text-blue-600">
                      {top3Stocks.length}개
                    </div>
                    <div className="text-xs text-gray-500 mt-1">
                      전체 {trackerData.stocks.length}개 중
                    </div>
                  </div>
                </div>

                {/* TOP 3 종목 리스트 (상위 10개만 표시) */}
                <div className="bg-white rounded-lg p-4 max-h-96 overflow-y-auto">
                  <h4 className="font-bold text-gray-800 mb-3">종목 목록 (수익률 순)</h4>
                  <div className="space-y-2">
                    {top3Stocks
                      .sort((a, b) => b.current_return - a.current_return)
                      .slice(0, top3Expanded ? top3Stocks.length : 10)
                      .map((stock, index) => {
                        const recDate = stock.recommendation_date ? new Date(stock.recommendation_date) : null;
                        const today = new Date();
                        const recLabel = recDate ? `${recDate.getMonth() + 1}/${recDate.getDate()}` : '-';
                        const todayLabel = `${today.getMonth() + 1}/${today.getDate()}`;
                        const diag = stock.diagnosis;
                        const diagEmoji = diag ? ({
                          shield: '🛡️', danger: '⚠️', caution: '⚡', rocket: '🚀', thumbsup: '👍', neutral: '📊'
                        })[diag.badge] || '📊' : null;
                        const diagColor = diag ? ({
                          shield: 'bg-blue-50 text-blue-700 border-blue-200',
                          danger: 'bg-red-50 text-red-700 border-red-200',
                          caution: 'bg-yellow-50 text-yellow-700 border-yellow-200',
                          rocket: 'bg-green-50 text-green-700 border-green-200',
                          thumbsup: 'bg-green-50 text-green-700 border-green-200',
                          neutral: 'bg-gray-50 text-gray-600 border-gray-200'
                        })[diag.badge] || 'bg-gray-50 text-gray-600 border-gray-200' : null;
                        return (
                          <div key={stock.stock_code + stock.recommendation_date} className="p-2 hover:bg-gray-50 rounded">
                            <div className="flex items-center justify-between gap-2">
                              <div className="flex items-center gap-1 md:gap-2 min-w-0 flex-wrap">
                                <span className="font-bold text-orange-600 text-sm">#{index + 1}</span>
                                <span className="font-semibold text-sm truncate">{stock.stock_name}</span>

                                <span className="text-[10px] md:text-xs text-gray-400">
                                  {recLabel}→{todayLabel}
                                </span>
                                <span className={`font-bold text-sm ${stock.is_winning ? 'text-green-600' : 'text-red-600'}`}>
                                  {stock.current_return > 0 ? '+' : ''}{stock.current_return.toFixed(1)}%
                                </span>
                              </div>
                            </div>
                            {diag && (
                              <div className={`mt-1 ml-6 px-2 py-1 rounded border text-[10px] md:text-xs ${diagColor}`}>
                                {diagEmoji} {diag.comment}
                                <span className="ml-1 opacity-70">
                                  (당일 {diag.dayReturn > 0 ? '+' : ''}{diag.dayReturn}%, 거래량 {diag.volumeRatio5d || diag.volumeRatio}배
                                  {diag.institutionDays >= 2 ? ` · 기관${diag.institutionDays}일` : ''}
                                  {diag.foreignDays >= 2 ? ` · 외인${diag.foreignDays}일` : ''})
                                </span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                  </div>
                  {top3Stocks.length > 10 && (
                    <button
                      onClick={() => setTop3Expanded(!top3Expanded)}
                      className="w-full text-center mt-2 text-sm text-blue-600 hover:text-blue-800 hover:underline cursor-pointer py-2"
                    >
                      {top3Expanded ? '접기 ▲' : `+${top3Stocks.length - 10}개 종목 더 보기 ▼`}

                <div className="mt-4 bg-white border border-yellow-300 rounded-lg p-3">
                  <p className="text-sm text-gray-700">
                    <strong className="text-orange-700">💡 TOP 3 전략:</strong>
                    <strong className="text-orange-700"> 매수고래 감지 + 비과열 → 점수 내림차순</strong> 선별의 실전 성과입니다.
                    {top3WinRate >= 70 && top3AvgReturn > 0 ? (
                      <span className="text-green-700"> ✅ 우수한 성과를 보이고 있습니다!</span>

                      <span className="text-orange-700"> ⚠️ 양호한 성과입니다.</span>
                    ) : (
                      <span className="text-red-700"> ❌ 시장 상황에 따라 성과가 부진할 수 있습니다.</span>
                    )}
                  </p>
                </div>
              </div>
            ) : null;
          })()}

          {/* v3.34: 방어 전략 성과 */}
          {perfStrategy === 'defense' && (() => {
            const defUniDates = trackerData.stocks
              ? [...new Set(trackerData.stocks.map(s => s.recommendation_date))].sort().reverse()
              : [];
            const defRecent5 = defUniDates.slice(0, 5);
            const defFiltered = trackerData.stocks ? trackerData.stocks.filter(stock => {
              const isRecent = defRecent5.includes(stock.recommendation_date);
              const hasSmartMoney = (stock.institution_buy_days >= 3 || stock.foreign_buy_days >= 3);
              const hasMinMc = stock.market_cap ? (stock.market_cap / 100000000) >= 5000 : false;
              const isNotOverheated = stock.recommendation_grade !== '과열';
              const isNotDayZero = (stock.days_since_recommendation || 0) > 0;
              return isRecent && hasSmartMoney && hasMinMc && isNotOverheated && isNotDayZero && (stock.defense_score || 0) >= 40;
            }) : [];

            const defWinCount = defFiltered.filter(s => s.is_winning).length;
            const defWinRate = defFiltered.length > 0 ? (defWinCount / defFiltered.length * 100) : 0;
            const defAvgReturn = defFiltered.length > 0
              ? defFiltered.reduce((sum, s) => sum + s.current_return, 0) / defFiltered.length : 0;

            return defFiltered.length > 0 ? (
              <div className="bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-300 rounded-xl p-3 md:p-6 mb-6 md:mb-8">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-2 md:gap-3 min-w-0">
                    <span className="text-2xl md:text-3xl flex-shrink-0">🛡️</span>
                    <div className="min-w-0">
                      <h3 className="text-lg md:text-2xl font-bold text-blue-800">방어 전략 성과</h3>
                      <p className="text-xs md:text-sm text-blue-600 mt-1">
                        기관/외국인 수급 기반 과매도 반등 (최근 5거래일)
                      </p>
                    </div>
                  </div>
                  <div className="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-lg">
                    {defFiltered.length}개
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">승률</div>
                    <div className={`text-2xl font-bold ${defWinRate >= 60 ? 'text-green-600' : defWinRate >= 40 ? 'text-orange-600' : 'text-red-600'}`}>
                      {defWinRate.toFixed(1)}%
                    </div>
                  </div>
                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">평균 수익률</div>
                    <div className={`text-2xl font-bold ${defAvgReturn > 0 ? 'text-green-600' : 'text-red-600'}`}>
                      {defAvgReturn > 0 ? '+' : ''}{defAvgReturn.toFixed(2)}%
                    </div>
                  </div>
                  <div className="bg-white rounded-lg p-4 shadow">
                    <div className="text-sm text-gray-600 mb-1">전적</div>
                    <div className="text-xl md:text-2xl font-bold text-blue-600">
                      {defWinCount}승 {defFiltered.length - defWinCount}패
                    </div>
                  </div>
                </div>

                <div className="space-y-2">
                  {defFiltered
                    .sort((a, b) => (b.defense_score || 0) - (a.defense_score || 0))
                    .slice(0, 5)
                    .map((stock, index) => {

    // DNA 추출 컴포넌트
